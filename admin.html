<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── BOOTSTRAP FROM SERVER — deep merge, never wipe local data ─── */
function __deepMerge(local, server) {
  if (server == null) return local;
  if (local == null) return server;
  if (Array.isArray(local) && Array.isArray(server)) {
    const byId = new Map();
    for (const x of local) if (x && x.id != null) byId.set(x.id, x);
    for (const x of server) {
      if (x && x.id != null) {
        const ex = byId.get(x.id);
        byId.set(x.id, ex ? __deepMerge(ex, x) : x);
      }
    }
    if (byId.size > 0) return Array.from(byId.values()).sort((a,b)=>(a.id||0)-(b.id||0));
    return server;
  }
  if (typeof local === 'object' && typeof server === 'object' && !Array.isArray(local) && !Array.isArray(server)) {
    const out = { ...local };
    for (const k of Object.keys(server)) out[k] = __deepMerge(out[k], server[k]);
    return out;
  }
  return server;
}
async function __bootstrapFromServer() {
  let data = null;
  try {
    const r = await fetch('/api/data', { cache: 'no-store' });
    if (!r.ok) return;
    data = await r.json();
  } catch (e) { return; }
  if (!data || typeof data !== 'object') return;
  Object.keys(data).forEach(k => {
    try {
      const existing = localStorage.getItem(k);
      let merged = data[k];
      if (existing) {
        try {
          const local = JSON.parse(existing);
          merged = __deepMerge(local, data[k]);
        } catch {}
      }
      localStorage.setItem(k, JSON.stringify(merged));
    } catch (e) {}
  });
}

(async () => {
await __bootstrapFromServer();

/* ─── STORAGE HELPERS ─── */
const SYNC_KEYS = [

  'geroi_promos','geroi_construction','geroi_infra','geroi_footer',
  'geroi_korpuses','geroi_site_render',
];
let __syncTimer = null;
let __syncListeners = [];
const setSyncStatus = (s) => { __syncListeners.forEach(fn => fn(s)); };
const syncToServer = () => {
  if (__syncTimer) clearTimeout(__syncTimer);
  setSyncStatus('pending');
  __syncTimer = setTimeout(() => {
    const payload = {};
    SYNC_KEYS.forEach(k => {
      try { const v = localStorage.getItem(k); if (v) payload[k] = JSON.parse(v); } catch {}
    });
    setSyncStatus('saving');
    fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': ADMIN_PASSWORD },
      body: JSON.stringify(payload),
    }).then(r => {
      if (r.ok) setSyncStatus('saved');
      else setSyncStatus('error');
    }).catch(() => setSyncStatus('error'));
  }, 700);
};

const ls = {
  load: (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  save: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch { return false; }
    syncToServer();
    return true;
  },
  remove: key => {
    try { localStorage.removeItem(key); } catch {}
    syncToServer();
  },
};

/* ─── TOAST ─── */
function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return <div className="toast">✓ {message}</div>;
}

/* ─── SYNC STATUS — server sync indicator (top-right) ─── */
function SyncStatus() {
  const [status, setStatus] = useState('idle');
  useEffect(() => {
    __syncListeners.push(setStatus);
    return () => { __syncListeners = __syncListeners.filter(f => f !== setStatus); };
  }, []);
  useEffect(() => {
    if (status === 'saved') {
      const t = setTimeout(() => setStatus('idle'), 1800);
      return () => clearTimeout(t);
    }
  }, [status]);
  if (status === 'idle') return null;
  const cfg = {
    pending: { icon: '⏳', text: 'Ожидание...',     bg: 'rgba(255,255,255,0.08)', color: 'rgba(255,255,255,0.7)' },
    saving:  { icon: '🔄', text: 'Синхронизация...', bg: 'rgba(227,133,77,0.18)', color: '#E3854D' },
    saved:   { icon: '✓',  text: 'Сохранено на сервере', bg: 'rgba(74,222,128,0.16)', color: '#4ade80' },
    error:   { icon: '⚠',  text: 'Ошибка синхронизации', bg: 'rgba(239,68,68,0.16)', color: '#f87171' },
  }[status] || { icon: '', text: '', bg: 'transparent', color: '#fff' };
  return (
    <div style={{
      position: 'fixed', top: 16, right: 20, zIndex: 999,
      padding: '8px 14px', borderRadius: 10, fontSize: 12, fontWeight: 600,
      background: cfg.bg, color: cfg.color,
      border: '1px solid rgba(255,255,255,0.08)', backdropFilter: 'blur(10px)',
      display: 'flex', alignItems: 'center', gap: 8,
      boxShadow: '0 4px 20px rgba(0,0,0,0.25)',
    }}>
      <span>{cfg.icon}</span>
      <span>{cfg.text}</span>
    </div>
  );
}

const XLS_COLUMNS = [
  { key: 'id',        label: 'ID',           example: 1,    type: 'int' },
  { key: 'korpus',    label: 'Корпус',       example: 1,    type: 'int' },
  { key: 'floor',     label: 'Этаж',         example: 1,    type: 'int' },
  { key: 'rooms',     label: 'Комнат',       example: 2,    type: 'int' },
  { key: 'area',      label: 'Площадь м²',   example: 62.95, type: 'float' },
  { key: 'price',     label: 'Цена ₽',       example: 6100000, type: 'int' },
  { key: 'available', label: 'Статус',       example: 'свободна', type: 'status' },
  { key: 'badge',     label: 'Метка',        example: '',   type: 'text' },
  { key: 'img',       label: 'Картинка',     example: 'assets/2-k.png', type: 'text' },
  { key: 'polygon',   label: 'Полигон',      example: '', type: 'text' },
];

function aptToRow(a) {
  return {
    'ID': a.id,
    'Корпус': a.korpus ?? 1,
    'Этаж': a.floor ?? '',
    'Комнат': a.rooms ?? 1,
    'Площадь м²': a.area ?? '',
    'Цена ₽': a.price ?? '',
    'Статус': a.available ? 'свободна' : 'продана',
    'Метка': a.badge ?? '',
    'Картинка': a.img ?? '',
    'Полигон': a.polygon ?? '',
  };
}
function rowToApt(r, idx) {
  const status = String(r['Статус'] || '').toLowerCase().trim();
  const sold = ['продана', 'продано', 'бронь', 'забронирована', 'sold', 'booked', 'no', 'нет', 'false'].includes(status);
  const id = Number(r['ID']) || (Date.now() + idx);
  return {
    id,
    korpus:  Number(r['Корпус']) || 1,
    floor:   Number(r['Этаж'])   || 1,
    rooms:   Number(r['Комнат']) || 1,
    area:    Number(r['Площадь м²']) || 0,
    price:   Number(r['Цена ₽']) || 0,
    available: !sold,
    badge:   String(r['Метка'] || '').trim() || null,
    img:     String(r['Картинка'] || '').trim(),
    polygon: String(r['Полигон'] || '').trim(),
  };
}

function downloadExcelTemplate(currentApts) {
  if (typeof XLSX === 'undefined') { alert('Библиотека XLSX не загружена. Перезагрузите страницу.'); return; }
  const rows = currentApts && currentApts.length
    ? currentApts.map(aptToRow)
    : [Object.fromEntries(XLS_COLUMNS.map(c => [c.label, c.example]))];
  const ws = XLSX.utils.json_to_sheet(rows, { header: XLS_COLUMNS.map(c => c.label) });
  // Column widths
  ws['!cols'] = XLS_COLUMNS.map(c => ({ wch: Math.max(c.label.length, 12) }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Квартиры');
  // Add a hint sheet with allowed values
  const hints = [
    ['Поле', 'Допустимые значения'],
    ['Корпус', '1, 2, 3, 4'],
    ['Статус', 'свободна / продана / бронь'],
    ['Метка', 'Акция, Хит, Премиум, Новинка, Последняя, или пусто'],
    ['Картинка', 'путь к файлу assets/... или полный URL https://...'],
    ['Полигон', 'координаты x,y x,y x,y... в виде строки (необязательно)'],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(hints);
  ws2['!cols'] = [{ wch: 12 }, { wch: 60 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'Подсказки');
  XLSX.writeFile(wb, 'apartments-template.xlsx');
}

async function readExcelFile(file) {
  if (typeof XLSX === 'undefined') throw new Error('Библиотека XLSX не загружена');
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
  return rows.map((r, i) => rowToApt(r, i)).filter(a => a.area > 0);
}

function ApartmentsTab({ toast }) {
  const [apts, setApts] = useState(() => ls.load('geroi_apts', DEFAULT_APARTMENTS));
  const [modal, setModal] = useState(null); // null | 'add' | apt object
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [sortBy, setSortBy] = useState('id');
  const xlsInputRef = useRef(null);

  const persist = next => { setApts(next); ls.save('geroi_apts', next); };

  const handleImportXlsx = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const newApts = await readExcelFile(file);
      if (!newApts.length) { alert('В файле нет ни одной строки с данными'); return; }
      const choice = confirm(
        `Найдено ${newApts.length} квартир в файле.\n\n` +
        `OK = ЗАМЕНИТЬ все ${apts.length} текущих квартир на эти ${newApts.length}\n` +
        `Cancel = ОБЪЕДИНИТЬ (обновить совпадающие по ID, добавить новые)`
      );
      if (choice) {
        persist(newApts);
        toast(`Импортировано ${newApts.length} квартир (заменено)`);
      } else {
        const byId = new Map(apts.map(a => [a.id, a]));
        for (const a of newApts) byId.set(a.id, { ...byId.get(a.id), ...a });
        const merged = Array.from(byId.values()).sort((a, b) => (a.id || 0) - (b.id || 0));
        persist(merged);
        toast(`Импортировано: ${newApts.length}, всего теперь: ${merged.length}`);
      }
    } catch (err) {
      alert('Ошибка импорта: ' + err.message);
    } finally {
      if (xlsInputRef.current) xlsInputRef.current.value = '';
    }
  };

  const handleSave = form => {
    if (modal === 'add') {
      persist([...apts, { ...form, id: Date.now() }]);
      toast('Квартира добавлена');
    } else {
      persist(apts.map(a => a.id === modal.id ? { ...form, id: modal.id } : a));
      toast('Изменения сохранены');
    }
    setModal(null);
  };

  const del = id => {
    if (!confirm('Удалить эту квартиру? Действие нельзя отменить.')) return;
    persist(apts.filter(a => a.id !== id));
    toast('Квартира удалена');
  };

  const toggleAvail = id => {
    persist(apts.map(a => a.id === id ? { ...a, available: !a.available } : a));
    toast('Статус обновлён');
  };

  const reset = () => {
    if (!confirm('Сбросить все квартиры к исходным данным? Все изменения будут удалены.')) return;
    persist(DEFAULT_APARTMENTS);
    toast('Данные сброшены');
  };

  const fmt = n => n ? n.toLocaleString('ru') : '—';

  const filtered = apts
    .filter(a => {
      if (filter === 'available' && !a.available) return false;
      if (filter === 'sold' && a.available) return false;
      if (search) {
        const q = search.toLowerCase();
        return `${a.rooms}к ${a.area} ${a.floor} к${a.korpus || 1} ${a.price} ${a.badge || ''}`.toLowerCase().includes(q);
      }
      return true;
    })
    .sort((a, b) => {
      if (sortBy === 'price-asc') return a.price - b.price;
      if (sortBy === 'price-desc') return b.price - a.price;
      if (sortBy === 'area') return a.area - b.area;
      if (sortBy === 'floor') return a.floor - b.floor;
      return a.id - b.id;
    });

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Квартиры</div>
        <div className="page-subtitle">{apts.length} квартир в базе · {apts.filter(a=>a.available).length} свободных</div>
      </div>
      <div className="page-body">

        {/* Stats */}
        <div className="stats-grid">
          {[
            { v: apts.length, l: 'Всего квартир' },
            { v: apts.filter(a=>a.available).length, l: 'Свободных' },
            { v: apts.filter(a=>!a.available).length, l: 'Продано/Бронь' },
            { v: apts.filter(a=>a.rooms===1).length, l: '1-комнатных' },
            { v: apts.filter(a=>a.rooms===2).length, l: '2-комнатных' },
            { v: apts.filter(a=>a.rooms===3).length, l: '3-комнатных' },
          ].map(({v,l}) => (
            <div key={l} className="stat-card">
              <div className="stat-card-value">{v}</div>
              <div className="stat-card-label">{l}</div>
            </div>
          ))}
        </div>

        {/* Toolbar */}
        <div className="toolbar">
          <div className="toolbar-left">
            <input className="search-input" placeholder="Поиск по площади, этажу, цене..." value={search} onChange={e => setSearch(e.target.value)} />
            <select style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 8, padding: '8px 12px', color: '#fff', fontSize: 13, outline: 'none', cursor: 'pointer' }}
              value={filter} onChange={e => setFilter(e.target.value)}>
              <option value="all">Все статусы</option>
              <option value="available">Свободные</option>
              <option value="sold">Проданные</option>
            </select>
            <select style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 8, padding: '8px 12px', color: '#fff', fontSize: 13, outline: 'none', cursor: 'pointer' }}
              value={sortBy} onChange={e => setSortBy(e.target.value)}>
              <option value="id">По добавлению</option>
              <option value="price-asc">Цена ↑</option>
              <option value="price-desc">Цена ↓</option>
              <option value="area">По площади</option>
              <option value="floor">По этажу</option>
            </select>
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <button className="btn btn-secondary btn-sm" onClick={() => downloadExcelTemplate([])} title="Скачать пустой шаблон с примером">📋 Шаблон</button>
            <button className="btn btn-secondary btn-sm" onClick={() => downloadExcelTemplate(apts)} title="Выгрузить текущие квартиры в Excel">📤 Выгрузить</button>
            <button className="btn btn-secondary btn-sm" onClick={() => xlsInputRef.current?.click()} title="Импорт из Excel">📥 Импорт</button>
            <input ref={xlsInputRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={handleImportXlsx} />
            <button className="btn btn-secondary btn-sm" onClick={reset}>Сбросить</button>
            <button className="btn btn-primary" onClick={() => setModal('add')}>+ Добавить квартиру</button>
          </div>
        </div>

        {/* Table */}
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Фото</th>
                <th>Тип</th>
                <th>Площадь</th>
                <th>Этаж</th>
                <th>Корпус</th>
                <th>Цена</th>
                <th>Статус</th>
                <th>Метка</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(a => (
                <tr key={a.id}>
                  <td>
                    {a.img
                      ? <img src={a.img} className="img-thumb" alt="" onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                      : null
                    }
                    <div className="no-img" style={{ display: a.img ? 'none' : 'flex' }}>нет</div>
                  </td>
                  <td style={{ color: '#fff', fontWeight: 600 }}>{a.rooms}-комн.</td>
                  <td>{a.area} м²</td>
                  <td>{a.floor} эт.</td>
                  <td>Корп. {a.korpus || 1}</td>
                  <td style={{ color: '#fff' }}>{fmt(a.price)} ₽</td>
                  <td>
                    <span
                      className={`badge ${a.available ? 'badge-green' : 'badge-red'}`}
                      style={{ cursor: 'pointer' }}
                      onClick={() => toggleAvail(a.id)}
                      title="Нажмите для смены статуса"
                    >
                      {a.available ? 'Свободна' : 'Продана'}
                    </span>
                  </td>
                  <td>
                    {a.badge
                      ? <span className="badge badge-orange">{a.badge}</span>
                      : <span style={{ color: 'rgba(255,255,255,0.2)', fontSize: 12 }}>—</span>
                    }
                  </td>
                  <td>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button className="btn btn-secondary btn-sm btn-icon" onClick={() => setModal(a)} title="Редактировать">✎</button>
                      <button className="btn btn-danger btn-sm btn-icon" onClick={() => del(a.id)} title="Удалить">✕</button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length === 0 && (
                <tr>
                  <td colSpan={9} style={{ textAlign: 'center', padding: '48px', color: 'rgba(255,255,255,0.2)', fontSize: 14 }}>
                    Квартиры не найдены
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      {modal && (
        <AptModal
          apt={modal === 'add' ? null : modal}
          onSave={handleSave}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

      exportedAt: new Date().toISOString(),
      apartments: ls.load('geroi_apts', DEFAULT_APARTMENTS),
      slides: ls.load('geroi_slides', DEFAULT_SLIDES),
      settings: ls.load('geroi_settings', DEFAULT_SETTINGS),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `geroi-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    toast('Резервная копия скачана');
  };

  const importFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.apartments) ls.save('geroi_apts', data.apartments);
        if (data.slides) ls.save('geroi_slides', data.slides);
        if (data.settings) ls.save('geroi_settings', data.settings);
        toast('Данные импортированы — обновите страницу');
      } catch {
        alert('Ошибка: файл повреждён или имеет неверный формат');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const clearAll = () => {
    if (!confirm('Удалить ВСЕ данные из браузера?\n\nСайт вернётся к исходным настройкам.\nЭто действие нельзя отменить.')) return;
    ls.remove('geroi_apts');
    ls.remove('geroi_slides');
    ls.remove('geroi_settings');
    toast('Все данные очищены');
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Экспорт и импорт</div>
        <div className="page-subtitle">Резервное копирование всех данных сайта</div>
      </div>
      <div className="page-body">

        <div className="settings-section">
          <h3>Резервная копия</h3>
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.45)', marginBottom: 20, lineHeight: 1.7 }}>
            Скачайте все данные — квартиры, слайдер и настройки — в JSON-файл.<br/>
            При необходимости загрузите этот файл, чтобы восстановить данные.
          </p>
          <div className="section-actions">
            <button className="btn btn-primary" onClick={exportAll}>⬇ Скачать резервную копию</button>
            <label className="btn btn-secondary" style={{ cursor: 'pointer' }}>
              ⬆ Загрузить резервную копию
              <input type="file" accept=".json" style={{ display: 'none' }} onChange={importFile} />
            </label>
          </div>
        </div>

        <div className="settings-section">
          <h3>Сброс данных</h3>
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.45)', marginBottom: 20, lineHeight: 1.7 }}>
            Полная очистка всех сохранённых данных. Сайт вернётся к исходным настройкам.
          </p>
          <button className="btn btn-danger" onClick={clearAll}>✕ Удалить все данные</button>
        </div>

        <div className="settings-section">
          <h3>Как это работает</h3>
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', lineHeight: 1.8 }}>
            Все изменения хранятся в браузере (localStorage).<br/>
            Сохранённые данные загружаются автоматически при открытии <a href="index.html" style={{ color: '#E3854D' }} target="_blank">сайта</a>.<br/>
            Чтобы перенести данные на другое устройство — скачайте резервную копию и загрузите её там.
          </p>
        </div>

      </div>
    </div>
  );
}

  const [draggingIdx, setDraggingIdx] = useState(null);
  const points = (value || '').trim()
    ? value.trim().split(/\s+/).map(p => p.split(',').map(Number)).filter(p => p.length === 2 && !isNaN(p[0]) && !isNaN(p[1]))
    : [];

  const toSvgCoords = e => {
    const svg = svgRef.current;
    if (!svg) return [0, 0];
    const rect = svg.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 56.25;
    return [Math.max(0, Math.min(100, x)), Math.max(0, Math.min(56.25, y))];
  };

  const setPoints = pts => onChange(pts.map(p => `${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(' '));

  const handleSvgClick = e => {
    if (draggingIdx !== null) return;
    if (e.target.tagName === 'circle') return;
    const [x, y] = toSvgCoords(e);
    setPoints([...points, [x, y]]);
  };

  const handleVertexMouseDown = (i, e) => {
    e.stopPropagation();
    setDraggingIdx(i);
  };

  const handleVertexRightClick = (i, e) => {
    e.preventDefault();
    e.stopPropagation();
    setPoints(points.filter((_, j) => j !== i));
  };

  useEffect(() => {
    if (draggingIdx === null) return;
    const onMove = e => {
      const [x, y] = toSvgCoords(e);
      setPoints(points.map((p, j) => j === draggingIdx ? [x, y] : p));
    };
    const onUp = () => setDraggingIdx(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [draggingIdx, points]);

  return (
    <div style={{ position: 'relative', borderRadius: 12, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.1)', background: '#0a0907' }}>
      <img src={imgSrc} alt="" style={{ width: '100%', display: 'block', userSelect: 'none', pointerEvents: 'none' }} draggable={false} />
      <svg
        ref={svgRef}
        viewBox="0 0 100 56.25"
        preserveAspectRatio="none"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', cursor: 'crosshair' }}
        onClick={handleSvgClick}
      >
        {points.length >= 3 && (
          <polygon
            points={points.map(p => p.join(',')).join(' ')}
            fill="rgba(217,78,31,0.32)"
            stroke="#E05520"
            strokeWidth="0.3"
            pointerEvents="none"
          />
        )}
        {points.length === 2 && (
          <line x1={points[0][0]} y1={points[0][1]} x2={points[1][0]} y2={points[1][1]} stroke="#E05520" strokeWidth="0.3" pointerEvents="none" />
        )}
        {points.map((p, i) => (
          <circle
            key={i}
            cx={p[0]}
            cy={p[1]}
            r="0.8"
            fill={draggingIdx === i ? '#fff' : '#E05520'}
            stroke="#fff"
            strokeWidth="0.25"
            style={{ cursor: 'grab' }}
            onMouseDown={e => handleVertexMouseDown(i, e)}
            onContextMenu={e => handleVertexRightClick(i, e)}
          />
        ))}
      </svg>
    </div>
  );
}

/* Image upload helper — sends raw bytes to /api/upload and returns the public URL */
async function uploadImageFile(file) {
  if (!file) throw new Error('Нет файла');
  if (file.size > 7.5 * 1024 * 1024) throw new Error('Файл слишком большой (макс 7.5 MB)');
  const r = await fetch('/api/upload', {
    method: 'POST',
    headers: {
      'Content-Type': file.type || 'application/octet-stream',
      'x-admin-password': ADMIN_PASSWORD,
      'x-filename': encodeURIComponent(file.name || 'upload'),
    },
    body: file,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${r.status}`);
  }
  const data = await r.json();
  return data.url;
}

/* Reusable file-picker that uploads to Vercel Blob and gives back the URL */
function ImageUploader({ value, onChange, label, accept = 'image/*', placeholder = 'или вставьте URL картинки' }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const ref = useRef(null);
  const onPick = async e => {
    const f = e.target.files?.[0];
    if (!f) return;
    setBusy(true); setErr('');
    try {
      const url = await uploadImageFile(f);
      onChange(url);
    } catch (e2) {
      setErr(e2.message || 'Ошибка');
    } finally {
      setBusy(false);
      if (ref.current) ref.current.value = '';
    }
  };
  return (
    <div>
      {label && <div className="form-label" style={{ marginBottom: 6 }}>{label}</div>}
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
        <button type="button" onClick={() => ref.current?.click()} disabled={busy}
          className="btn btn-primary" style={{ flexShrink: 0, opacity: busy ? 0.6 : 1, cursor: busy ? 'wait' : 'pointer' }}>
          {busy ? '⏳ Загрузка...' : '📤 Загрузить файл'}
        </button>
        <input ref={ref} type="file" accept={accept} style={{ display: 'none' }} onChange={onPick} />
        <input type="text" value={value || ''} onChange={e => onChange(e.target.value)}
          placeholder={placeholder} style={{ flex: 1, minWidth: 200 }} />
      </div>
      {value && (
        <div style={{ marginTop: 8 }}>
          <img src={value} alt="" style={{ maxHeight: 80, borderRadius: 6, border: '1px solid rgba(255,255,255,0.1)' }} onError={e => { e.currentTarget.style.display = 'none'; }} />
        </div>
      )}
      {err && <div style={{ marginTop: 6, fontSize: 12, color: '#f87171' }}>⚠ {err}</div>}
    </div>
  );
}

/* Editor for apartment polygons over a floor-schema image.
   Shows all apartment polygons (read-only translucent) plus an editable one for activeId. */
function AptSchemaEditor({ imgSrc, apts, activeId, onChange }) {
  const svgRef = useRef(null);
  const [draggingIdx, setDraggingIdx] = useState(null);
  const active = apts.find(a => a.id === activeId);
  const points = (active?.polygon || '').trim()
    ? active.polygon.trim().split(/\s+/).map(p => p.split(',').map(Number)).filter(p => p.length === 2 && !isNaN(p[0]))
    : [];

  const toCoords = e => {
    const svg = svgRef.current;
    if (!svg) return [0, 0];
    const r = svg.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * 100;
    const y = ((e.clientY - r.top) / r.height) * 56.25;
    return [Math.max(0, Math.min(100, x)), Math.max(0, Math.min(56.25, y))];
  };
  const setPoints = pts => onChange(pts.map(p => `${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(' '));

  const handleSvgClick = e => {
    if (draggingIdx !== null) return;
    if (e.target.tagName === 'circle') return;
    if (active == null) return;
    const c = toCoords(e);
    setPoints([...points, c]);
  };
  const handleVertexDown = (i, e) => { e.stopPropagation(); setDraggingIdx(i); };
  const handleVertexRight = (i, e) => { e.preventDefault(); e.stopPropagation(); setPoints(points.filter((_, j) => j !== i)); };

  useEffect(() => {
    if (draggingIdx === null) return;
    const onMove = e => { const c = toCoords(e); setPoints(points.map((p, j) => j === draggingIdx ? c : p)); };
    const onUp = () => setDraggingIdx(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [draggingIdx, points]);

  return (
    <div style={{ position: 'relative', borderRadius: 12, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.1)', background: '#0a0907' }}>
      <img src={imgSrc} alt="" style={{ width: '100%', display: 'block', userSelect: 'none', pointerEvents: 'none' }} draggable={false} />
      <svg ref={svgRef} viewBox="0 0 100 56.25" preserveAspectRatio="none"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', cursor: active ? 'crosshair' : 'default' }}
        onClick={handleSvgClick}>
        {/* read-only existing polygons */}
        {apts.filter(a => a.id !== activeId && a.polygon).map(a => (
          <polygon key={a.id} points={a.polygon}
            fill="rgba(120,200,255,0.18)" stroke="rgba(120,200,255,0.55)" strokeWidth="0.2"
            vectorEffect="non-scaling-stroke" pointerEvents="none" />
        ))}
        {/* active polygon */}
        {points.length >= 3 && (
          <polygon points={points.map(p => p.join(',')).join(' ')}
            fill="rgba(217,78,31,0.34)" stroke="#E05520" strokeWidth="0.3"
            vectorEffect="non-scaling-stroke" pointerEvents="none" />
        )}
        {points.length === 2 && (
          <line x1={points[0][0]} y1={points[0][1]} x2={points[1][0]} y2={points[1][1]} stroke="#E05520" strokeWidth="0.3" pointerEvents="none" />
        )}
        {points.map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r="0.8"
            fill={draggingIdx === i ? '#fff' : '#E05520'} stroke="#fff" strokeWidth="0.25"
            style={{ cursor: 'grab' }}
            onMouseDown={e => handleVertexDown(i, e)}
            onContextMenu={e => handleVertexRight(i, e)} />
        ))}
      </svg>
      {!active && (
        <div style={{
          position: 'absolute', top: 14, left: 14, padding: '8px 12px',
          background: 'rgba(20,17,14,0.92)', backdropFilter: 'blur(8px)',
          color: '#fff', fontSize: 12, borderRadius: 8, pointerEvents: 'none',
        }}>← Выберите квартиру слева, чтобы начать обводить контур</div>
      )}
    </div>
  );
}

            <span>{t.label}</span>
          </div>
        ))}
        <div className="sidebar-bottom">
          <a href="index.html" target="_blank" style={{ display: 'block', fontSize: 13, color: 'rgba(255,255,255,0.35)', marginBottom: 12, textDecoration: 'none' }}>
            ↗ Открыть сайт
          </a>
          <button className="btn btn-secondary" style={{ width: '100%', justifyContent: 'center', fontSize: 12 }} onClick={logout}>
            Выйти
          </button>
        </div>
      </div>

      {/* Content */}
      <div className="main-content">
        {tab === 'apartments'   && <ApartmentsTab toast={showToast} />}
        {tab === 'korpuses'     && <KorpusesTab toast={showToast} />}
        {tab === 'slider'       && <SliderTab toast={showToast} />}
        {tab === 'about'        && <AboutTab toast={showToast} />}
        {tab === 'promos'       && <PromosTab toast={showToast} />}
        {tab === 'construction' && <ConstructionTab toast={showToast} />}
        {tab === 'infra'        && <InfraTab toast={showToast} />}
        {tab === 'settings'     && <SettingsTab toast={showToast} />}
        {tab === 'footer'       && <FooterTab toast={showToast} />}
        {tab === 'export'       && <ExportTab toast={showToast} />}
      </div>

      {toastMsg && <Toast message={toastMsg} onDone={() => setToastMsg(null)} />}
      <SyncStatus />
    </div>
  );
}

/* ─── ROOT ─── */
function App() {
  const [auth, setAuth] = useState(() => sessionStorage.getItem('geroi_admin') === '1');
  if (!auth) return <LoginScreen onLogin={() => setAuth(true)} />;
  return <AdminPanel />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
