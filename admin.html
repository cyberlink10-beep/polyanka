    /* Bootstrap from server before React loads */
    (function () {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/data', false);
        xhr.timeout = 4000;
        xhr.send();
        if (xhr.status === 200) {
          var data = JSON.parse(xhr.responseText || '{}');
          Object.keys(data).forEach(function (k) {
            try { localStorage.setItem(k, JSON.stringify(data[k])); } catch (e) {}
          });
        }

/* ─── BOOTSTRAP FROM SERVER — deep merge, never wipe local data ─── */
function __deepMerge(local, server) {
  if (server == null) return local;
  if (local == null) return server;
  if (Array.isArray(local) && Array.isArray(server)) {
    const byId = new Map();
    for (const x of local) if (x && x.id != null) byId.set(x.id, x);
    for (const x of server) {
      if (x && x.id != null) {
        const ex = byId.get(x.id);
        byId.set(x.id, ex ? __deepMerge(ex, x) : x);
      }
    }
    if (byId.size > 0) return Array.from(byId.values()).sort((a,b)=>(a.id||0)-(b.id||0));
    return server;
  }
  if (typeof local === 'object' && typeof server === 'object' && !Array.isArray(local) && !Array.isArray(server)) {
    const out = { ...local };
    for (const k of Object.keys(server)) out[k] = __deepMerge(out[k], server[k]);
    return out;
  }
  return server;
}
async function __bootstrapFromServer() {
  let data = null;
  try {
    const r = await fetch('/api/data', { cache: 'no-store' });
    if (!r.ok) return;
    data = await r.json();
  } catch (e) { return; }
  if (!data || typeof data !== 'object') return;
  Object.keys(data).forEach(k => {
    try {
      const existing = localStorage.getItem(k);
      let merged = data[k];
      if (existing) {
        try {
          const local = JSON.parse(existing);
          merged = __deepMerge(local, data[k]);
        } catch {}
      }
      localStorage.setItem(k, JSON.stringify(merged));
    } catch (e) {}
  });
}

const SYNC_KEYS = [

];
let __syncTimer = null;
let __syncListeners = [];
const setSyncStatus = (s) => { __syncListeners.forEach(fn => fn(s)); };
const syncToServer = () => {
  if (__syncTimer) clearTimeout(__syncTimer);
  setSyncStatus('pending');
  __syncTimer = setTimeout(() => {
    const payload = {};
    SYNC_KEYS.forEach(k => {
      try { const v = localStorage.getItem(k); if (v) payload[k] = JSON.parse(v); } catch {}
    });

      body: JSON.stringify(payload),
    }).then(r => {
      if (r.ok) setSyncStatus('saved');
      else setSyncStatus('error');
    }).catch(() => setSyncStatus('error'));
  }, 700);
};

const ls = {
  load: (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  save: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch { return false; }
    syncToServer();
    return true;
  },
  remove: key => {
    try { localStorage.removeItem(key); } catch {}
    syncToServer();
  },
};

/* ─── TOAST ─── */
function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return <div className="toast">✓ {message}</div>;
}

/* ─── SYNC STATUS — server sync indicator (top-right) ─── */
function SyncStatus() {
  const [status, setStatus] = useState('idle');
  useEffect(() => {
    __syncListeners.push(setStatus);
    return () => { __syncListeners = __syncListeners.filter(f => f !== setStatus); };
  }, []);
  useEffect(() => {
    if (status === 'saved') {
      const t = setTimeout(() => setStatus('idle'), 1800);
      return () => clearTimeout(t);
    }
  }, [status]);
  if (status === 'idle') return null;

/* ─── EXCEL HELPERS — формат «Шахматка с планировками» отдела продаж ───
   Двухстрочная шапка:
   ряд 1: Корпус | Подъезд | № кв | Этаж | Комнатность | Площадь | · | Стоимость | · | Планировка | Статус
   ряд 2:   ·   |    ·    |   ·  |  ·   |      ·      | Объекта вся | С учётом 1/2,3 | кв.м | квартиры | · | ·
*/
const num = (v) => {
  if (v === null || v === undefined || v === '') return 0;
  const n = parseFloat(String(v).replace(/\s/g, '').replace(',', '.').replace(/[^\d.\-]/g, ''));
  return isFinite(n) ? n : 0;
};

function aptStatusText(a) {
  if (a.available === false) return a.badge && /бронь|заброн/i.test(a.badge) ? 'бронь' : 'продана';
  return 'свободна';
}

/* Build the .xlsx — sales-department two-row header for columns A-K,

function downloadExcelTemplate(currentApts) {

  const header1 = ['Корпус', 'Подъезд', '№ кв', 'Этаж', 'Комнатность', 'Площадь', '', 'Стоимость', '', 'Планировка', 'Статус', 'Метка', 'Фото-планировка', 'Полигон (контур)', 'ID'];
  const header2 = ['', '', '', '', '', 'Объекта вся', 'С учётом 1/2,3', 'кв.м', 'квартиры', '', '', '', '', '', ''];
  const src = (currentApts && currentApts.length) ? currentApts : [
    { id:1001, korpus:1, entrance:1, number:1, floor:1, rooms:1, area:49.2, areaCoef:47.2, pricePerM:95000, price:4484000, planUrl:'https://disk.yandex.ru/i/...', available:true, badge:'', img:'', polygon:'' },
  ];
  const dataRows = src.map(a => ([
    `${a.korpus || 1} корпус`,
    a.entrance ?? '',
    a.number ?? '',
    a.floor ?? '',
    a.rooms ?? '',
    a.area ?? '',
    a.areaCoef ?? '',
    a.pricePerM ?? '',
    a.price ?? '',
    a.planUrl || '',
    a.available === false ? aptStatusText(a) : '',
    a.badge || '',
    a.img || '',
    a.polygon || '',
    a.id ?? '',
  ]));
  const aoa = [header1, header2, ...dataRows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [
    { wch: 11 }, { wch: 9 }, { wch: 7 }, { wch: 7 }, { wch: 13 },
    { wch: 13 }, { wch: 15 }, { wch: 12 }, { wch: 13 }, { wch: 34 }, { wch: 18 },
    { wch: 14 }, { wch: 28 }, { wch: 40 }, { wch: 9 },
  ];
  // Merge the grouped header cells (Площадь / Стоимость span two columns)
  ws['!merges'] = [
    { s:{r:0,c:0}, e:{r:1,c:0} }, { s:{r:0,c:1}, e:{r:1,c:1} },
    { s:{r:0,c:2}, e:{r:1,c:2} }, { s:{r:0,c:3}, e:{r:1,c:3} },
    { s:{r:0,c:4}, e:{r:1,c:4} }, { s:{r:0,c:5}, e:{r:0,c:6} },
    { s:{r:0,c:7}, e:{r:0,c:8} }, { s:{r:0,c:9}, e:{r:1,c:9} },
    { s:{r:0,c:10}, e:{r:1,c:10} }, { s:{r:0,c:11}, e:{r:1,c:11} },
    { s:{r:0,c:12}, e:{r:1,c:12} }, { s:{r:0,c:13}, e:{r:1,c:13} },
    { s:{r:0,c:14}, e:{r:1,c:14} },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'список');
  const hints = [
    ['Поле', 'Как заполнять'],
    ['Корпус', '«1 корпус», «2 корпус» — текстом, как в шахматке'],
    ['Подъезд', 'номер подъезда: 1, 2, ...'],
    ['№ кв', 'номер квартиры'],
    ['Этаж / Комнатность', 'целые числа'],
    ['Площадь · Объекта вся', 'полная площадь, м²'],
    ['Площадь · С учётом 1/2,3', 'площадь с понижающим коэффициентом — она показывается на сайте'],
    ['Стоимость · кв.м', 'цена за квадратный метр'],
    ['Стоимость · квартиры', 'итоговая стоимость квартиры'],
    ['Планировка', 'ссылка на изображение/страницу планировки'],
    ['Статус', 'пусто или «свободна» = в продаже · «продана» · «бронь» / «забронирована»'],
    ['Метка', 'необязательная плашка: Акция, Хит, Премиум, Новинка, Последняя'],
    ['Фото-планировка', 'ссылка на загруженное фото планировки (assets/... или https://...)'],
    ['Полигон (контур)', '⚠️ НЕ удалять и НЕ менять! Координаты обводки квартиры на схеме этажа. Если стереть — контур придётся обводить заново в админке.'],
    ['ID', '⚠️ НЕ менять! Технический идентификатор для синхронизации. Если пусто — будет вычислен автоматически.'],
  ];
  const wsH = XLSX.utils.aoa_to_sheet(hints);
  wsH['!cols'] = [{ wch: 26 }, { wch: 88 }];
  XLSX.utils.book_append_sheet(wb, wsH, 'Подсказки');
  XLSX.writeFile(wb, 'Шахматка_ЖК_Полянка.xlsx');
}

async function readExcelFile(file) {
  if (typeof XLSX === 'undefined') throw new Error('Библиотека XLSX не загружена');
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  // Locate the technical columns by header text — they may be absent, or
  // shifted if the sales team adds columns. Columns A-K stay positional.
  let colBadge = 11, colImg = 12, colPoly = 13, colId = 14;
  for (const row of aoa.slice(0, 3)) {
    row.forEach((cell, idx) => {
      const t = String(cell ?? '').toLowerCase();
      if (/метк/.test(t)) colBadge = idx;
      else if (/фото|картинк/.test(t)) colImg = idx;
      else if (/полигон|контур/.test(t)) colPoly = idx;
      else if (/^id$/.test(t.trim())) colId = idx;
    });
  }

  const apts = [];
  for (const row of aoa) {
    const c0 = String(row[0] ?? '').toLowerCase();
    if (!c0.includes('корпус')) continue;           // skip headers / blank rows
    const number = parseInt(num(row[2]));
    if (!number) continue;                          // header row («№ кв») or empty
    const korpus = parseInt(String(row[0]).match(/\d+/)?.[0]) || 1;
    const entrance = parseInt(num(row[1])) || 1;
    const floor = parseInt(num(row[3])) || 1;
    const rooms = parseInt(num(row[4])) || 1;
    const area = num(row[5]);                       // «Объекта вся» — основная, показывается на сайте
    const areaCoef = num(row[6]);                   // «С учётом 1/2,3» — вторичная
    const pricePerM = Math.round(num(row[7]));
    const price = Math.round(num(row[8]));
    const planUrl = String(row[9] ?? '').trim();
    const statusRaw = String(row[10] ?? '').toLowerCase().trim();
    const sold = /продан/.test(statusRaw);
    const booked = /бронь|заброн/.test(statusRaw);
    // Technical columns (preserved on round-trip)
    const badgeRaw = String(row[colBadge] ?? '').trim();
    const img = String(row[colImg] ?? '').trim();
    const polygon = String(row[colPoly] ?? '').trim();
    const idRaw = parseInt(num(row[colId]));
    apts.push({
      id: idRaw || (korpus * 1000 + number),
      korpus, entrance, number, floor, rooms,
      area: Math.round((area || areaCoef) * 100) / 100,
      areaCoef: Math.round((areaCoef || 0) * 100) / 100,
      pricePerM, price,
      available: !sold && !booked,
      badge: badgeRaw || (booked ? 'Бронь' : null),
      planUrl,
      img,
      polygon,
    });
  }
  return apts;
}

function ApartmentsTab({ toast }) {
  const [apts, setApts] = useState(() => ls.load('geroi_apts', DEFAULT_APARTMENTS));
  const [modal, setModal] = useState(null); // null | 'add' | apt object
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [sortBy, setSortBy] = useState('id');
  const xlsInputRef = useRef(null);

  const persist = next => { setApts(next); ls.save('geroi_apts', next); };

  const handleImportXlsx = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const newApts = await readExcelFile(file);
      if (!newApts.length) { alert('В файле нет ни одной строки с данными'); return; }
      const choice = confirm(
        `Найдено ${newApts.length} квартир в файле.\n\n` +
        `OK = ЗАМЕНИТЬ все ${apts.length} текущих квартир на эти ${newApts.length}\n` +
        `Cancel = ОБЪЕДИНИТЬ (обновить совпадающие по ID, добавить новые)`
      );
      if (choice) {
        persist(newApts);
        toast(`Импортировано ${newApts.length} квартир (заменено)`);
      } else {
        const byId = new Map(apts.map(a => [a.id, a]));
        for (const a of newApts) byId.set(a.id, { ...byId.get(a.id), ...a });
        const merged = Array.from(byId.values()).sort((a, b) => (a.id || 0) - (b.id || 0));
        persist(merged);
        toast(`Импортировано: ${newApts.length}, всего теперь: ${merged.length}`);
      }
    } catch (err) {
      alert('Ошибка импорта: ' + err.message);
    } finally {
      if (xlsInputRef.current) xlsInputRef.current.value = '';
    }
  };

  const handleSave = form => {
    if (modal === 'add') {
      persist([...apts, { ...form, id: Date.now() }]);
      toast('Квартира добавлена');
    } else {
      persist(apts.map(a => a.id === modal.id ? { ...form, id: modal.id } : a));
      toast('Изменения сохранены');
    }
    setModal(null);
  };

  const del = id => {
    if (!confirm('Удалить эту квартиру? Действие нельзя отменить.')) return;
    persist(apts.filter(a => a.id !== id));
    toast('Квартира удалена');
  };

  const toggleAvail = id => {
    persist(apts.map(a => a.id === id ? { ...a, available: !a.available } : a));
    toast('Статус обновлён');
  };

  const reset = () => {
    if (!confirm('Сбросить все квартиры к исходным данным? Все изменения будут удалены.')) return;
    persist(DEFAULT_APARTMENTS);
    toast('Данные сброшены');
  };

  const fmt = n => n ? n.toLocaleString('ru') : '—';

  const filtered = apts
    .filter(a => {
      if (filter === 'available' && !a.available) return false;
      if (filter === 'sold' && a.available) return false;
      if (search) {
        const q = search.toLowerCase();
        return `${a.rooms}к ${a.area} ${a.floor} к${a.korpus || 1} ${a.price} ${a.badge || ''}`.toLowerCase().includes(q);
      }
      return true;
    })
    .sort((a, b) => {
      if (sortBy === 'price-asc') return a.price - b.price;
      if (sortBy === 'price-desc') return b.price - a.price;
      if (sortBy === 'area') return a.area - b.area;
      if (sortBy === 'floor') return a.floor - b.floor;
      return a.id - b.id;
    });

  return (
    <div>

        <div className="page-title">Квартиры</div>

            { v: apts.filter(a=>a.rooms===1).length, l: '1-комнатных' },
            { v: apts.filter(a=>a.rooms===2).length, l: '2-комнатных' },
            { v: apts.filter(a=>a.rooms===3).length, l: '3-комнатных' },
          ].map(({v,l}) => (
            <div key={l} className="stat-card">
              <div className="stat-card-value">{v}</div>
              <div className="stat-card-label">{l}</div>
            </div>
          ))}
        </div>

        {/* Toolbar */}

            <select style={{ background: 'rgba(0,0,0,0.05)', border: '1px solid rgba(0,0,0,0.06)', borderRadius: 8, padding: '8px 12px', color: 'var(--text)', fontSize: 13, outline: 'none', cursor: 'pointer' }}

            <select style={{ background: 'rgba(0,0,0,0.05)', border: '1px solid rgba(0,0,0,0.06)', borderRadius: 8, padding: '8px 12px', color: 'var(--text)', fontSize: 13, outline: 'none', cursor: 'pointer' }}
              value={sortBy} onChange={e => setSortBy(e.target.value)}>
              <option value="id">По добавлению</option>
              <option value="price-asc">Цена ↑</option>

/* ─── EXPORT TAB ─── */
function ExportTab({ toast }) {
  const exportAll = () => {
    const data = {
      exportedAt: new Date().toISOString(),
      apartments: ls.load('geroi_apts', DEFAULT_APARTMENTS),
      slides: ls.load('geroi_slides', DEFAULT_SLIDES),
      settings: ls.load('geroi_settings', DEFAULT_SETTINGS),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `geroi-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    toast('Резервная копия скачана');
  };

  const importFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.apartments) ls.save('geroi_apts', data.apartments);
        if (data.slides) ls.save('geroi_slides', data.slides);
        if (data.settings) ls.save('geroi_settings', data.settings);
        toast('Данные импортированы — обновите страницу');
      } catch {
        alert('Ошибка: файл повреждён или имеет неверный формат');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const clearAll = () => {
    if (!confirm('Удалить ВСЕ данные из браузера?\n\nСайт вернётся к исходным настройкам.\nЭто действие нельзя отменить.')) return;
    ls.remove('geroi_apts');
    ls.remove('geroi_slides');
    ls.remove('geroi_settings');
    toast('Все данные очищены');
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Экспорт и импорт</div>
        <div className="page-subtitle">Резервное копирование всех данных сайта</div>
      </div>
      <div className="page-body">

        <div className="settings-section">
          <h3>Резервная копия</h3>
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.45)', marginBottom: 20, lineHeight: 1.7 }}>
            Скачайте все данные — квартиры, слайдер и настройки — в JSON-файл.<br/>
            При необходимости загрузите этот файл, чтобы восстановить данные.
          </p>
          <div className="section-actions">
            <button className="btn btn-primary" onClick={exportAll}>⬇ Скачать резервную копию</button>
            <label className="btn btn-secondary" style={{ cursor: 'pointer' }}>
              ⬆ Загрузить резервную копию
              <input type="file" accept=".json" style={{ display: 'none' }} onChange={importFile} />
            </label>
          </div>
        </div>

        <div className="settings-section">
          <h3>Сброс данных</h3>
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.45)', marginBottom: 20, lineHeight: 1.7 }}>
            Полная очистка всех сохранённых данных. Сайт вернётся к исходным настройкам.
          </p>
          <button className="btn btn-danger" onClick={clearAll}>✕ Удалить все данные</button>
        </div>

        <div className="settings-section">
          <h3>Как это работает</h3>
          <p style={{ fontSize: 13, color: 'rgba(0,0,0,0.55)', lineHeight: 1.8 }}>
            Все изменения хранятся в браузере (localStorage).<br/>
            Сохранённые данные загружаются автоматически при открытии <a href="index.html" style={{ color: '#A85D3F' }} target="_blank">сайта</a>.<br/>
            Чтобы перенести данные на другое устройство — скачайте резервную копию и загрузите её там.
          </p>
        </div>

      </div>
    </div>
  );
}

/* Compact file-picker button — uploads to /api/upload and hands the file back via onPick */
function PhotoUploadButton({ onPick, label, small, accept = 'image/*' }) {
  const [busy, setBusy] = useState(false);
  const ref = useRef(null);
  const handle = async e => {
    const f = e.target.files?.[0];
    if (!f) return;
    setBusy(true);
    try { await onPick(f); }
    finally {
      setBusy(false);
      if (ref.current) ref.current.value = '';
    }
  };
  return (
    <>
      <button type="button"
        className={`btn btn-primary ${small ? 'btn-sm' : 'btn-sm'}`}
        disabled={busy}
        onClick={() => ref.current?.click()}
        style={{ opacity: busy ? 0.6 : 1, cursor: busy ? 'wait' : 'pointer', whiteSpace: 'nowrap' }}
      >
        {busy ? '⏳ Загрузка...' : label}
      </button>
      <input ref={ref} type="file" accept={accept} style={{ display: 'none' }} onChange={handle} />
    </>
  );
}

function PolygonEditor({ value, onChange, imgSrc }) {
  const svgRef = useRef(null);
  const [draggingIdx, setDraggingIdx] = useState(null);
  const points = (value || '').trim()
    ? value.trim().split(/\s+/).map(p => p.split(',').map(Number)).filter(p => p.length === 2 && !isNaN(p[0]) && !isNaN(p[1]))
    : [];

  const toSvgCoords = e => {
    const svg = svgRef.current;
    if (!svg) return [0, 0];
    const rect = svg.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 56.25;
    return [Math.max(0, Math.min(100, x)), Math.max(0, Math.min(56.25, y))];
  };

  const setPoints = pts => onChange(pts.map(p => `${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(' '));

  const handleSvgClick = e => {
    if (draggingIdx !== null) return;
    if (e.target.tagName === 'circle') return;
    const [x, y] = toSvgCoords(e);
    setPoints([...points, [x, y]]);
  };

  const handleVertexMouseDown = (i, e) => {
    e.stopPropagation();
    setDraggingIdx(i);
  };

  const handleVertexRightClick = (i, e) => {
    e.preventDefault();
    e.stopPropagation();
    setPoints(points.filter((_, j) => j !== i));
  };

  useEffect(() => {
    if (draggingIdx === null) return;
    const onMove = e => {
      const [x, y] = toSvgCoords(e);
      setPoints(points.map((p, j) => j === draggingIdx ? [x, y] : p));
    };
    const onUp = () => setDraggingIdx(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [draggingIdx, points]);

  return (
    <div style={{ position: 'relative', borderRadius: 12, overflow: 'hidden', border: '1px solid rgba(0,0,0,0.08)', background: 'var(--surface-2)' }}>
      <img src={imgSrc} alt="" style={{ width: '100%', display: 'block', userSelect: 'none', pointerEvents: 'none' }} draggable={false} />
      <svg
        ref={svgRef}
        viewBox="0 0 100 56.25"
        preserveAspectRatio="none"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', cursor: 'crosshair' }}
        onClick={handleSvgClick}
      >
        {points.length >= 3 && (
          <polygon
            points={points.map(p => p.join(',')).join(' ')}
            fill="rgba(217,78,31,0.32)"
            stroke="#E05520"
            strokeWidth="0.3"
            pointerEvents="none"
          />
        )}
        {points.length === 2 && (
          <line x1={points[0][0]} y1={points[0][1]} x2={points[1][0]} y2={points[1][1]} stroke="#E05520" strokeWidth="0.3" pointerEvents="none" />
        )}
        {points.map((p, i) => (
          <circle
            key={i}
            cx={p[0]}
            cy={p[1]}
            r="0.8"
            fill={draggingIdx === i ? '#fff' : '#E05520'}
            stroke="#fff"
            strokeWidth="0.25"
            style={{ cursor: 'grab' }}
            onMouseDown={e => handleVertexMouseDown(i, e)}
            onContextMenu={e => handleVertexRightClick(i, e)}
          />
        ))}
      </svg>
    </div>
  );
}

/* Client-side image optimiser — runs in the browser before upload.
   Downscales to a sane resolution and re-encodes to WebP (falls back
   to JPEG). Planировки/рендеры in 2-20 MB shrink to ~100-400 KB with
   no visible quality loss. Non-images (PDF/DOC) and SVG pass through. */
async function optimizeImage(file, { maxSize = 2000, quality = 0.9 } = {}) {
  if (!file || !file.type || !file.type.startsWith('image/')) return file;
  if (file.type === 'image/svg+xml' || file.type === 'image/gif') return file;
  try {
    const dataUrl = await new Promise((res, rej) => {
      const fr = new FileReader();
      fr.onload = () => res(fr.result);
      fr.onerror = () => rej(new Error('read'));
      fr.readAsDataURL(file);
    });
    const img = await new Promise((res, rej) => {
      const im = new Image();
      im.onload = () => res(im);
      im.onerror = () => rej(new Error('decode'));
      im.src = dataUrl;
    });
    const w0 = img.naturalWidth || img.width;
    const h0 = img.naturalHeight || img.height;
    if (!w0 || !h0) return file;
    const scale = Math.min(1, maxSize / w0, maxSize / h0);
    // Already small and lightweight — leave as-is
    if (scale >= 1 && file.size < 500 * 1024) return file;
    const w = Math.round(w0 * scale), h = Math.round(h0 * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, 0, 0, w, h);
    const webpOk = canvas.toDataURL('image/webp').indexOf('data:image/webp') === 0;
    const outType = webpOk ? 'image/webp' : 'image/jpeg';
    if (!webpOk) {
      // JPEG has no alpha — paint white behind so transparent PNGs don't go black
      ctx.globalCompositeOperation = 'destination-over';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'source-over';
    }
    const blob = await new Promise(res => canvas.toBlob(res, outType, quality));
    if (!blob || blob.size >= file.size) return file; // optimisation didn't help
    const ext = webpOk ? '.webp' : '.jpg';
    const base = String(file.name || 'image').replace(/\.[^.]+$/, '');
    return new File([blob], base + ext, { type: outType });
  } catch {
    return file; // any failure — fall back to the original file
  }
}

/* Image upload helper — optimises in-browser, then sends to /api/upload */
async function uploadImageFile(file) {
  if (!file) throw new Error('Нет файла');
  const optimized = await optimizeImage(file);
  if (optimized.size > 7.5 * 1024 * 1024) throw new Error('Файл слишком большой (макс 7.5 MB)');
  const r = await fetch('/api/upload', {
    method: 'POST',
    headers: {
      'Content-Type': optimized.type || 'application/octet-stream',
      'x-admin-password': ADMIN_PASSWORD,
      'x-filename': encodeURIComponent(optimized.name || 'upload'),
    },
    body: optimized,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${r.status}`);
  }
  const data = await r.json();
  return data.url;
}

/* Reusable file-picker that uploads to Vercel Blob and gives back the URL */
function ImageUploader({ value, onChange, label, accept = 'image/*', placeholder = 'или вставьте URL картинки' }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const ref = useRef(null);
  const onPick = async e => {
    const f = e.target.files?.[0];
    if (!f) return;
    setBusy(true); setErr('');
    try {
      const url = await uploadImageFile(f);
      onChange(url);
    } catch (e2) {
      setErr(e2.message || 'Ошибка');
    } finally {
      setBusy(false);
      if (ref.current) ref.current.value = '';
    }
  };
  return (
    <div>
      {label && <div className="form-label" style={{ marginBottom: 6 }}>{label}</div>}
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
        <button type="button" onClick={() => ref.current?.click()} disabled={busy}
          className="btn btn-primary" style={{ flexShrink: 0, opacity: busy ? 0.6 : 1, cursor: busy ? 'wait' : 'pointer' }}>
          {busy ? '⏳ Загрузка...' : '📤 Загрузить файл'}
        </button>
        <input ref={ref} type="file" accept={accept} style={{ display: 'none' }} onChange={onPick} />
        <input type="text" value={value || ''} onChange={e => onChange(e.target.value)}
          placeholder={placeholder} style={{ flex: 1, minWidth: 200 }} />
      </div>
      {value && (
        <div style={{ marginTop: 8 }}>
          <img src={value} alt="" style={{ maxHeight: 80, borderRadius: 6, border: '1px solid rgba(0,0,0,0.08)' }} onError={e => { e.currentTarget.style.display = 'none'; }} />
        </div>
      )}
      {err && <div style={{ marginTop: 6, fontSize: 12, color: '#f87171' }}>⚠ {err}</div>}
    </div>
  );
}

function AptSchemaEditor({ imgSrc, apts, activeId, onChange }) {
  const svgRef = useRef(null);
  const [draggingIdx, setDraggingIdx] = useState(null);
  const active = apts.find(a => a.id === activeId);
  const points = (active?.polygon || '').trim()
    ? active.polygon.trim().split(/\s+/).map(p => p.split(',').map(Number)).filter(p => p.length === 2 && !isNaN(p[0]))

  const toCoords = e => {

    const r = svg.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * 100;
    const y = ((e.clientY - r.top) / r.height) * 56.25;
    return [Math.max(0, Math.min(100, x)), Math.max(0, Math.min(56.25, y))];
  };
  const setPoints = pts => onChange(pts.map(p => `${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(' '));

  };
  const handleVertexDown = (i, e) => { e.stopPropagation(); setDraggingIdx(i); };
  const handleVertexRight = (i, e) => { e.preventDefault(); e.stopPropagation(); setPoints(points.filter((_, j) => j !== i)); };

  useEffect(() => {
    if (draggingIdx === null) return;
    const onMove = e => { const c = toCoords(e); setPoints(points.map((p, j) => j === draggingIdx ? c : p)); };
    const onUp = () => setDraggingIdx(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [draggingIdx, points]);

  return (
    <div style={{ position: 'relative', borderRadius: 12, overflow: 'hidden', border: '1px solid rgba(0,0,0,0.08)', background: 'var(--surface-2)' }}>
      <img src={imgSrc} alt="" style={{ width: '100%', display: 'block', userSelect: 'none', pointerEvents: 'none' }} draggable={false} />
      <svg ref={svgRef} viewBox="0 0 100 56.25" preserveAspectRatio="none"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', cursor: active ? 'crosshair' : 'default' }}
        onClick={handleSvgClick}>
        {/* read-only existing polygons */}
        {apts.filter(a => a.id !== activeId && a.polygon).map(a => (
          <polygon key={a.id} points={a.polygon}
            fill="rgba(120,200,255,0.18)" stroke="rgba(120,200,255,0.55)" strokeWidth="0.2"
            vectorEffect="non-scaling-stroke" pointerEvents="none" />
        ))}
        {/* active polygon */}
        {points.length >= 3 && (
          <polygon points={points.map(p => p.join(',')).join(' ')}
            fill="rgba(217,78,31,0.34)" stroke="#E05520" strokeWidth="0.3"
            vectorEffect="non-scaling-stroke" pointerEvents="none" />
        )}
        {points.length === 2 && (
          <line x1={points[0][0]} y1={points[0][1]} x2={points[1][0]} y2={points[1][1]} stroke="#E05520" strokeWidth="0.3" pointerEvents="none" />
        )}
        {points.map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r="0.8"
            fill={draggingIdx === i ? '#fff' : '#E05520'} stroke="#fff" strokeWidth="0.25"
            style={{ cursor: 'grab' }}
            onMouseDown={e => handleVertexDown(i, e)}
            onContextMenu={e => handleVertexRight(i, e)} />
        ))}
      </svg>
      {!active && (
        <div style={{
          position: 'absolute', top: 14, left: 14, padding: '8px 12px',
          background: 'rgba(20,17,14,0.92)', backdropFilter: 'blur(8px)',
          color: '#fff', fontSize: 12, borderRadius: 8, pointerEvents: 'none',
        }}>← Выберите квартиру слева, чтобы начать обводить контур</div>
      )}
    </div>
  );
}

function KorpusesTab({ toast }) {
  const [korpuses, setKorpuses] = useState(() => ls.load('geroi_korpuses', DEFAULT_KORPUSES_ADMIN));
  const [siteRender, setSiteRender] = useState(() => ls.load('geroi_site_render', 'assets/site-render.jpg'));
  const [apts, setApts] = useState(() => ls.load('geroi_apts', DEFAULT_APARTMENTS));
  const [selId, setSelId] = useState(korpuses[0]?.id || 1);
  const [mode, setMode] = useState('korpus'); // 'korpus' | 'entrance' | 'floor' | 'apts'
  const [floorNum, setFloorNum] = useState(1);
  const [entranceId, setEntranceId] = useState(null);
  const [activeAptId, setActiveAptId] = useState(null);

  const sel = korpuses.find(k => k.id === selId) || korpuses[0];
  const persist = next => { setKorpuses(next); ls.save('geroi_korpuses', next); };
  const saveAll = () => { ls.save('geroi_korpuses', korpuses); ls.save('geroi_apts', apts); toast('Полигоны и квартиры сохранены'); };
  const resetAll = () => { if (confirm('Восстановить полигоны по умолчанию?')) { persist(DEFAULT_KORPUSES_ADMIN); toast('Сброшено'); } };
  const updateSel = patch => persist(korpuses.map(k => k.id === selId ? { ...k, ...patch } : k));

  const addKorpus = () => {
    const maxId = korpuses.reduce((m, k) => Math.max(m, Number(k.id) || 0), 0);
    const newKorpus = {
      id: maxId + 1,
      name: `Корпус ${korpuses.length + 1}`,
      floors: 9, total: 60, free: 20,
      polygon: '', floorPolygons: {}, floorSchemas: {},
      entrances: [], // оставим пустым — админ сам решит сколько подъездов добавить
      cx: 50, cy: 50,
    };
    persist([...korpuses, newKorpus]);
    setSelId(newKorpus.id);
    setMode('korpus');
    toast(`Добавлен «${newKorpus.name}»`);
  };
  const delKorpus = () => {
    if (korpuses.length <= 1) { alert('Должен остаться хотя бы один корпус'); return; }
    if (!confirm(`Удалить «${sel.name}»? Все квартиры этого корпуса тоже удалятся.`)) return;
    const remaining = korpuses.filter(k => k.id !== selId);
    const remainingApts = apts.filter(a => a.korpus !== selId);
    persist(remaining);
    persistApts(remainingApts);
    setSelId(remaining[0].id);
    toast('Корпус удалён');
  };
  const renameKorpus = () => {
    const n = prompt('Новое название', sel.name);
    if (n && n.trim()) updateSel({ name: n.trim() });
  };

  /* Floor-polygons storage helpers — per-entrance when an entrance is picked,
     fall back to the korpus-level dict for legacy data / "общий" режим. */
  const getFloorPolygons = () => {
    if (entranceId != null && Array.isArray(sel.entrances)) {
      const en = sel.entrances.find(e => e.id === entranceId);
      if (en) return en.floorPolygons || {};
    }
    return sel.floorPolygons || {};
  };
  const setFloorPolygonsDict = (dict) => {
    if (entranceId != null && Array.isArray(sel.entrances)) {
      const nextEnts = sel.entrances.map(e => e.id === entranceId ? { ...e, floorPolygons: dict } : e);
      updateSel({ entrances: nextEnts });
    } else {
      updateSel({ floorPolygons: dict });
    }
  };

  const onChangeKorpusPolygon = pts => updateSel({ polygon: pts });
  const onChangeFloorPolygon = pts => {
    const fp = { ...getFloorPolygons(), [floorNum]: pts };
    setFloorPolygonsDict(fp);
  };
  const onChangeEntrancePolygon = pts => {
    if (entranceId == null) return;
    updateSel({ entrancePolygons: { ...(sel.entrancePolygons || {}), [entranceId]: pts } });
  };
  const clearKorpusPolygon = () => updateSel({ polygon: '' });
  const clearFloorPolygon = () => {
    const fp = { ...getFloorPolygons() }; delete fp[floorNum];
    setFloorPolygonsDict(fp);
  };
  const clearEntrancePolygon = () => {
    if (entranceId == null) return;
    const ep = { ...(sel.entrancePolygons || {}) }; delete ep[entranceId];
    updateSel({ entrancePolygons: ep });
  };
  const clearAllFloors = () => {
    if (!confirm('Удалить разметку всех этажей' + (entranceId != null ? ' этого подъезда' : ' этого корпуса') + '?')) return;
    setFloorPolygonsDict({});
  };
  const clearAllEntrances = () => { if (confirm('Удалить разметку всех подъездов этого корпуса?')) updateSel({ entrancePolygons: {} }); };
  /* Unified "Clear" button — wipes the polygon for the currently active mode */
  const clearCurrent = () => {
    if (mode === 'korpus')        clearKorpusPolygon();
    else if (mode === 'entrance') clearEntrancePolygon();
    else if (mode === 'floor')    clearFloorPolygon();
    else if (mode === 'apts')     clearAptPolygon();
  };

  /* Apartments mode helpers */
  const floorSchemaUrl = (sel.floorSchemas && sel.floorSchemas[floorNum]) || '';
  const setFloorSchemaUrl = url => updateSel({ floorSchemas: { ...(sel.floorSchemas || {}), [floorNum]: url } });
  const aptsOnFloor = apts.filter(a => {
    if (a.korpus !== selId) return false;
    if (Number(a.floor) !== Number(floorNum)) return false;
    // Filter by entrance when both the apartment and the editor have one set.
    if (entranceId != null && a.entrance != null && a.entrance !== entranceId) return false;
    return true;
  });
  const persistApts = next => { setApts(next); ls.save('geroi_apts', next); };
  const updateApt = (id, patch) => persistApts(apts.map(a => a.id === id ? { ...a, ...patch } : a));
  const onChangeAptPolygon = pts => { if (activeAptId != null) updateApt(activeAptId, { polygon: pts }); };
  const clearAptPolygon = () => { if (activeAptId != null) updateApt(activeAptId, { polygon: '' }); };

  /* Ensure entranceId stays valid as we switch korpus / entrances change */
  useEffect(() => {
    const ents = Array.isArray(sel?.entrances) ? sel.entrances : [];
    if (ents.length === 0) { setEntranceId(null); return; }
    if (entranceId == null || !ents.some(e => e.id === entranceId)) setEntranceId(ents[0].id);
  }, [selId, sel?.entrances?.length]);

  return (
    <>
      <div className="page-header">
        <div className="page-title">Корпуса и этажи</div>
        <div className="page-subtitle">Обводите контуры корпусов и этажей прямо на фотографии комплекса</div>
      </div>
      <div className="page-body">

        {/* Korpus selector cards + add/delete */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, gap: 12, flexWrap: 'wrap' }}>
          <div style={{ fontSize: 12, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'rgba(0,0,0,0.5)', fontWeight: 600 }}>Корпуса · {korpuses.length}</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn btn-secondary btn-sm" onClick={renameKorpus}>Переименовать</button>
            <button className="btn btn-danger btn-sm" onClick={delKorpus} disabled={korpuses.length <= 1}>Удалить</button>
            <button className="btn btn-primary btn-sm" onClick={addKorpus}>+ Добавить корпус</button>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(auto-fill, minmax(180px, 1fr))`, gap: 12, marginBottom: 24 }}>
          {korpuses.map(k => (
            <div key={k.id} onClick={() => { setSelId(k.id); setMode('korpus'); }}
              className={`korpus-card ${selId === k.id ? 'active' : ''}`}>
              <div className="korpus-card-name">{k.name}</div>
              <div className="korpus-card-meta">
                {k.floors} эт · {k.total} кв · {Object.keys(k.floorPolygons || {}).length}/{k.floors} размечено
              </div>
            </div>
          ))}
        </div>

        {/* Korpus settings inputs */}
        <div className="form-grid" style={{ marginBottom: 20 }}>
          <div className="form-group">
            <span className="form-label">Название</span>
            <input value={sel.name} onChange={e => updateSel({ name: e.target.value })} />
          </div>
          <div className="form-group">
            <span className="form-label">Количество этажей</span>
            <input type="number" min={1} max={50} value={sel.floors} onChange={e => updateSel({ floors: Math.max(1, Number(e.target.value) || 1) })} />
          </div>
          <div className="form-group">
            <span className="form-label">Всего квартир</span>
            <input type="number" min={0} value={sel.total} onChange={e => updateSel({ total: Number(e.target.value) || 0 })} />
          </div>
          <div className="form-group">
            <span className="form-label">Свободно (для подсказки)</span>
            <input type="number" min={0} value={sel.free} onChange={e => updateSel({ free: Number(e.target.value) || 0 })} />
          </div>
        </div>

        {/* Entrances editor */}
        {(() => {
          const ents = Array.isArray(sel.entrances) ? sel.entrances : [];
          const setEnts = (next) => updateSel({ entrances: next });
          const addEnt = () => {
            const maxId = ents.reduce((m, e) => Math.max(m, Number(e.id) || 0), 0);
            setEnts([...ents, { id: maxId + 1, name: `Подъезд ${ents.length + 1}`, floors: sel.floors || 9, totalApts: 0 }]);
          };
          const delEnt = (i) => {
            if (!confirm('Удалить этот подъезд?')) return;
            setEnts(ents.filter((_, j) => j !== i));
          };
          const setEnt = (i, k, v) => setEnts(ents.map((e, j) => j === i ? { ...e, [k]: v } : e));
          const moveEnt = (i, dir) => {
            const j = i + dir;
            if (j < 0 || j >= ents.length) return;
            const a = [...ents]; [a[i], a[j]] = [a[j], a[i]]; setEnts(a);
          };
          return (
            <div className="settings-section" style={{ marginBottom: 20 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                <h3 style={{ margin: 0 }}>Подъезды · {ents.length}</h3>
                <button className="btn btn-primary btn-sm" onClick={addEnt}>+ Добавить подъезд</button>
              </div>
              {ents.length === 0 && (
                <div style={{ padding: '20px 0', fontSize: 13, color: 'var(--text-3)' }}>
                  Если подъезд один — шаг «Выберите подъезд» на сайте автоматически пропускается.
                </div>
              )}
              {ents.map((e, i) => (
                <div key={i} style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr 1fr auto', gap: 10, alignItems: 'end', padding: '10px 0', borderTop: i === 0 ? 'none' : '1px solid var(--hairline-2)' }}>
                  <div className="form-group">
                    <span className="form-label">Название</span>
                    <input value={e.name || ''} onChange={ev => setEnt(i, 'name', ev.target.value)} placeholder={`Подъезд ${i + 1}`} />
                  </div>
                  <div className="form-group">
                    <span className="form-label">Этажей</span>
                    <input type="number" min={1} max={50} value={e.floors || ''} onChange={ev => setEnt(i, 'floors', Math.max(1, Number(ev.target.value) || 1))} />
                  </div>
                  <div className="form-group">
                    <span className="form-label">Квартир</span>
                    <input type="number" min={0} value={e.totalApts || ''} onChange={ev => setEnt(i, 'totalApts', Number(ev.target.value) || 0)} />
                  </div>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <button className="btn btn-secondary btn-sm" onClick={() => moveEnt(i, -1)} disabled={i === 0} style={{ padding: '6px 9px' }}>↑</button>
                    <button className="btn btn-secondary btn-sm" onClick={() => moveEnt(i, 1)} disabled={i === ents.length - 1} style={{ padding: '6px 9px' }}>↓</button>
                    <button className="btn btn-danger btn-sm" onClick={() => delEnt(i)}>Удалить</button>
                  </div>
                </div>
              ))}
            </div>
          );
        })()}

        {/* Mode toggle — 4 modes + unified Clear button */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 14, alignItems: 'center', flexWrap: 'wrap' }}>
          <button className={mode === 'korpus' ? 'btn btn-primary' : 'btn btn-secondary'} onClick={() => setMode('korpus')}>
            Контур корпуса
          </button>
          <button className={mode === 'entrance' ? 'btn btn-primary' : 'btn btn-secondary'} onClick={() => setMode('entrance')}
            disabled={!Array.isArray(sel.entrances) || sel.entrances.length === 0}
            title={!Array.isArray(sel.entrances) || sel.entrances.length === 0 ? 'Добавьте подъезды в блоке выше' : ''}>
            Контуры подъездов
          </button>
          <button className={mode === 'floor' ? 'btn btn-primary' : 'btn btn-secondary'} onClick={() => setMode('floor')}>
            Контуры этажей
          </button>
          <button className={mode === 'apts' ? 'btn btn-primary' : 'btn btn-secondary'} onClick={() => setMode('apts')}>
            Квартиры на этаже
          </button>

          {/* Entrance selector — available in entrance / floor / apts modes (optional for floor) */}
          {(mode === 'entrance' || mode === 'floor' || mode === 'apts') && Array.isArray(sel.entrances) && sel.entrances.length > 0 && (
            <>
              <span style={{ fontSize: 12, color: 'var(--text-3)', marginLeft: 12 }}>Подъезд:</span>
              <select
                value={entranceId == null ? '' : entranceId}
                onChange={e => { const v = e.target.value; setEntranceId(v === '' ? null : Number(v)); setActiveAptId(null); }}
                style={{ width: 180, padding: '7px 10px', fontSize: 13 }}
              >
                {mode === 'floor' && (
                  <option value="">Общий (без привязки)</option>
                )}
                {sel.entrances.map(en => {
                  const fpDict = (en.floorPolygons && Object.keys(en.floorPolygons).length) ? en.floorPolygons : null;
                  const epHas = sel.entrancePolygons?.[en.id];
                  return (
                    <option key={en.id} value={en.id}>
                      {en.name || `Подъезд ${en.id}`}
                      {mode === 'entrance' ? (epHas ? ' ✓' : '') : ''}
                      {mode === 'floor' && fpDict ? ` · ${Object.keys(fpDict).length} этаж.` : ''}
                    </option>
                  );
                })}
              </select>
            </>
          )}

          {/* Floor selector (floor + apts) */}
          {(mode === 'floor' || mode === 'apts') && (() => {
            const fp = getFloorPolygons();
            const totalFloors = (() => {
              if (entranceId != null && Array.isArray(sel.entrances)) {
                const en = sel.entrances.find(e => e.id === entranceId);
                if (en?.floors) return en.floors;
              }
              return sel.floors;
            })();
            return (
              <>
                <span style={{ fontSize: 12, color: 'var(--text-3)', marginLeft: 12 }}>Этаж:</span>
                <select value={floorNum} onChange={e => { setFloorNum(Number(e.target.value)); setActiveAptId(null); }}
                  style={{ width: 110, padding: '7px 10px', fontSize: 13 }}>
                  {Array.from({ length: totalFloors }, (_, i) => totalFloors - i).map(f => (
                    <option key={f} value={f}>
                      {f} этаж {mode === 'floor' ? (fp[f] ? '✓' : '') : (sel.floorSchemas?.[f] ? '🖼' : '')}
                    </option>
                  ))}
                </select>
              </>
            );
          })()}

          {/* Single Clear button — context-aware */}
          <button className="btn btn-danger btn-sm" onClick={clearCurrent} style={{ marginLeft: 12 }}
            disabled={mode === 'apts' && activeAptId == null}
            title="Очистить текущий контур">
            Очистить контур
          </button>

          {/* Bulk clear helpers */}
          {mode === 'floor' && (
            <button className="btn btn-danger btn-sm" onClick={clearAllFloors}>Очистить все этажи</button>
          )}
          {mode === 'entrance' && (
            <button className="btn btn-danger btn-sm" onClick={clearAllEntrances}>Очистить все подъезды</button>
          )}
        </div>

        {/* Hint */}
        <div style={{ background: 'rgba(168,93,63,0.08)', border: '1px solid rgba(168,93,63,0.25)', padding: '10px 14px', borderRadius: 8, marginBottom: 16, fontSize: 12, color: 'rgba(0,0,0,0.75)', lineHeight: 1.5 }}>
          <b>Как пользоваться:</b> кликните по фотографии, чтобы добавить точку контура. Перетаскивайте точки для коррекции. Правый клик по точке — удалить.
          {mode === 'entrance' && ' Обведите каждый подъезд отдельно — переключайте подъезды в выпадающем списке выше.'}
          {mode === 'floor' && (entranceId != null
            ? ' Контур этажа сохранится для выбранного подъезда — переключайте подъезды и этажи в выпадающих списках выше.'
            : ' Контур сохранится в общую разметку корпуса. Выберите подъезд, чтобы рисовать контуры для конкретного подъезда.')}
          {mode === 'apts' && ' Выберите подъезд и этаж, затем выберите квартиру слева и обведите её контур на схеме этажа.'}
        </div>

        {/* Editor: korpus / entrance / floor mode uses site render; apts mode uses floor schema */}
        {mode !== 'apts' ? (
          <PolygonEditor
            imgSrc={siteRender}
            value={
              mode === 'korpus'   ? (sel.polygon || '') :
              mode === 'entrance' ? (sel.entrancePolygons?.[entranceId] || '') :
              /* floor */           (getFloorPolygons()[floorNum] || '')
            }
            onChange={
              mode === 'korpus'   ? onChangeKorpusPolygon :
              mode === 'entrance' ? onChangeEntrancePolygon :
              /* floor */           onChangeFloorPolygon
            }
          />
        ) : (
          <div>
            {/* Floor schema upload */}
            <div style={{ marginBottom: 12, padding: 12, background: 'var(--surface-2)', borderRadius: 10 }}>
              <ImageUploader
                label={`Фото-планировка этажа ${floorNum}`}
                value={floorSchemaUrl}
                onChange={url => setFloorSchemaUrl(url)}
                placeholder="assets/floor-k1-f1.jpg"
              />
            </div>

            {!floorSchemaUrl ? (
              <div style={{ padding: 24, background: 'var(--surface-2)', borderRadius: 10, textAlign: 'center', color: 'rgba(0,0,0,0.65)', fontSize: 13 }}>
                Укажите путь к фото-планировке выше, чтобы начать обводить квартиры
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 14 }}>
                {/* Apartment list (filter by korpus + entrance + floor) */}
                <div style={{ background: 'var(--surface-2)', borderRadius: 10, padding: 12, maxHeight: 520, overflowY: 'auto' }}>
                  <div className="form-label" style={{ marginBottom: 8 }}>
                    Квартиры
                    {entranceId != null && Array.isArray(sel.entrances) ? ` · ${(sel.entrances.find(e => e.id === entranceId)?.name || '')}` : ''}
                    {' · '}этаж {floorNum} ({aptsOnFloor.length})
                  </div>
                  {aptsOnFloor.length === 0 ? (
                    <div style={{ fontSize: 12, color: 'var(--text-3)', lineHeight: 1.5 }}>
                      Нет квартир с этими параметрами. Добавьте их во вкладке «Квартиры», указав корпус, подъезд и этаж.
                    </div>
                  ) : aptsOnFloor.map(a => {
                    const active = activeAptId === a.id;
                    const has = a.polygon && a.polygon.trim();
                    const aptEntName = a.entrance != null ? (sel.entrances?.find(e => e.id === a.entrance)?.name || `Подъезд ${a.entrance}`) : null;
                    return (
                      <div key={a.id} onClick={() => setActiveAptId(a.id)}
                        style={{
                          padding: '10px 12px', marginBottom: 6, borderRadius: 8,
                          cursor: 'pointer', transition: 'all 150ms',
                          background: active ? 'rgba(168,93,63,0.12)' : 'rgba(0,0,0,0.03)',
                          border: '1.5px solid', borderColor: active ? '#A85D3F' : 'rgba(0,0,0,0.05)',
                        }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 6 }}>
                          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>Кв. {a.id} · {a.rooms}-к · {a.area}м²</span>
                          <span style={{ fontSize: 14, color: has ? '#1F8638' : 'var(--text-3)' }}>{has ? '✓' : '○'}</span>
                        </div>
                        <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>
                          {a.available ? 'Свободна' : 'Бронь/Продана'} · {a.price?.toLocaleString('ru-RU')} ₽
                          {aptEntName ? ` · ${aptEntName}` : (entranceId != null ? ' · нет подъезда' : '')}
                        </div>
                        {active && entranceId != null && a.entrance !== entranceId && (
                          <button
                            className="btn btn-secondary btn-sm"
                            style={{ marginTop: 8, width: '100%', justifyContent: 'center' }}
                            onClick={ev => { ev.stopPropagation(); updateApt(a.id, { entrance: entranceId }); toast(`Квартира привязана к ${(sel.entrances.find(e => e.id === entranceId)?.name || 'подъезду')}`); }}
                          >
                            Привязать к {sel.entrances.find(e => e.id === entranceId)?.name || 'подъезду'}
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Editor — schema with all polys overlaid, only active is editable */}
                <AptSchemaEditor
                  imgSrc={floorSchemaUrl}
                  apts={aptsOnFloor}
                  activeId={activeAptId}
                  onChange={onChangeAptPolygon}
                />
              </div>
            )}
          </div>
        )}

        {/* Save */}
        <div style={{ marginTop: 20, display: 'flex', gap: 10 }}>
          <button className="btn btn-primary" onClick={saveAll}>Сохранить всё</button>
          <button className="btn btn-secondary" onClick={resetAll}>Сбросить к стандартным</button>
        </div>

        {/* Site render upload */}
        <div style={{ marginTop: 28, padding: 16, background: 'var(--surface-2)', borderRadius: 10 }}>
          <ImageUploader
            label="Фотография комплекса (вид сверху)"
            value={siteRender}
            onChange={url => { setSiteRender(url); ls.save('geroi_site_render', url); toast('Фото комплекса обновлено'); }}
            placeholder="assets/site-render.jpg"
          />
        </div>

      </div>
    </>
  );
}

const TABS = [
  { id: 'apartments',   label: 'Квартиры',       icon: '🏠' },
  { id: 'korpuses',     label: 'Корпуса',         icon: '🏢' },
  { id: 'slider',       label: 'Слайдер',         icon: '🖼' },
  { id: 'about',        label: 'О комплексе',     icon: '📋' },
  { id: 'promos',       label: 'Акции',           icon: '🎁' },
  { id: 'features',     label: 'Преимущества',    icon: '⭐' },
  { id: 'gallery',      label: 'Галерея',         icon: '🖼️' },
  { id: 'construction', label: 'Строительство',   icon: '🏗️' },
  { id: 'infra',        label: 'Инфраструктура',  icon: '🗺️' },
  { id: 'settings',     label: 'Настройки',       icon: '⚙️' },
  { id: 'docs',         label: 'Документы',       icon: '📑' },
  { id: 'footer',       label: 'Подвал',          icon: '📄' },
  { id: 'export',       label: 'Экспорт',         icon: '💾' },
];

/* ─── ADMIN PANEL ─── */
function AdminPanel() {
  const [tab, setTab] = useState('apartments');
  const [toastMsg, setToastMsg] = useState(null);

  const showToast = msg => setToastMsg(msg);

  const logout = () => {
    sessionStorage.removeItem('geroi_admin');
    window.location.reload();
  };

  return (
    <div className="admin-layout">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <h1>ЖК Полянка</h1>
          <p>Панель управления</p>
        </div>
        {TABS.map(t => (
          <div key={t.id} className={`nav-item ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            <span style={{ fontSize: 15 }}>{t.icon}</span>
            <span>{t.label}</span>
          </div>
        ))}
        <div className="sidebar-bottom">
          <a href="index.html" target="_blank" style={{ display: 'block', fontSize: 13, color: 'rgba(0,0,0,0.55)', marginBottom: 12, textDecoration: 'none' }}>
            ↗ Открыть сайт
          </a>
          <button className="btn btn-secondary" style={{ width: '100%', justifyContent: 'center', fontSize: 12 }} onClick={logout}>
            Выйти
          </button>
        </div>
      </div>

      {/* Content */}
      <div className="main-content">
        {tab === 'apartments'   && <ApartmentsTab toast={showToast} />}
        {tab === 'korpuses'     && <KorpusesTab toast={showToast} />}
        {tab === 'slider'       && <SliderTab toast={showToast} />}
        {tab === 'about'        && <AboutTab toast={showToast} />}
        {tab === 'promos'       && <PromosTab toast={showToast} />}
        {tab === 'features'     && <FeaturesTab toast={showToast} />}
        {tab === 'gallery'      && <GalleryTab toast={showToast} />}
        {tab === 'construction' && <ConstructionTab toast={showToast} />}
        {tab === 'infra'        && <InfraTab toast={showToast} />}
        {tab === 'settings'     && <SettingsTab toast={showToast} />}
        {tab === 'docs'         && <DocsTab toast={showToast} />}
        {tab === 'footer'       && <FooterTab toast={showToast} />}
        {tab === 'export'       && <ExportTab toast={showToast} />}
      </div>

      {toastMsg && <Toast message={toastMsg} onDone={() => setToastMsg(null)} />}
      <SyncStatus />
    </div>
  );
}

/* ─── ROOT ─── */
function App() {
  const [auth, setAuth] = useState(() => sessionStorage.getItem('geroi_admin') === '1');
  if (!auth) return <LoginScreen onLogin={() => setAuth(true)} />;
  return <AdminPanel />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
