                onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,0.12)'} />

              <button type="submit" className="btn btn-primary btn-lg"
                style={{ marginTop: 6, width: '100%', opacity: (agreePolicy && agreeMarketing) ? 1 : 0.55, cursor: (agreePolicy && agreeMarketing) ? 'pointer' : 'not-allowed' }}
                disabled={!agreePolicy || !agreeMarketing}
                onMouseDown={addRipple}>
                {preset.cta}
              </button>

              <label style={{ display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer', marginTop: 4 }}>
                <input type="checkbox" checked={agreePolicy} onChange={e => setAgreePolicy(e.target.checked)} style={{ width: 18, height: 18, accentColor: '#A85D3F', marginTop: 2, flexShrink: 0, cursor: 'pointer' }} />
                <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.55)', lineHeight: 1.55 }}>
                  Принимаю <a href={docHref('privacyPolicy')} target="_blank" rel="noopener" style={{ color: 'var(--c-gold)', textDecoration: 'underline', textUnderlineOffset: 2 }} onClick={e => e.stopPropagation()}>политику конфиденциальности</a> и даю согласие на <a href={docHref('personalConsent')} target="_blank" rel="noopener" style={{ color: 'var(--c-gold)', textDecoration: 'underline', textUnderlineOffset: 2 }} onClick={e => e.stopPropagation()}>обработку персональных данных</a>
                </span>
              </label>

              <label style={{ display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer' }}>
                <input type="checkbox" checked={agreeMarketing} onChange={e => setAgreeMarketing(e.target.checked)} style={{ width: 18, height: 18, accentColor: '#A85D3F', marginTop: 2, flexShrink: 0, cursor: 'pointer' }} />
                <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.55)', lineHeight: 1.55 }}>
                  Даю согласие на <a href={docHref('marketingConsent')} target="_blank" rel="noopener" style={{ color: 'var(--c-gold)', textDecoration: 'underline', textUnderlineOffset: 2 }} onClick={e => e.stopPropagation()}>получение рекламно-информационных материалов</a>
                </span>
              </label>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

const useLeadForm = () => React.useContext(LeadFormContext);

/* ─── APP ─── */
function App() {
  const [activeSection, setActiveSection] = useState('hero');
  const [selectedApt, setSelectedApt] = useState(null);
  const [leadIntent, setLeadIntent] = useState(null);
  const [view, setView] = useState(() => {
    const p = (typeof window !== 'undefined' ? window.location.pathname : '/').replace(/\/$/, '') || '/';
    if (p === '/flat') return 'apartments';
    if (p === '/doc')  return 'docs';
    return 'home';
  });
  useReveal();

  const handleNav = useCallback((sectionId) => {
    // On /flat or /doc — navigate to home with hash (full reload)
    if (view !== 'home') {
      window.location.href = '/#' + sectionId;
      return;
    }
    setActiveSection(sectionId);
    const el = document.getElementById(sectionId);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  }, [view]);

  const goHome = () => { window.location.href = '/'; };

  // On home, scroll to hash if present (after navigation from /flat)
  useEffect(() => {
    if (view !== 'home') return;
    const hash = window.location.hash.replace('#', '');
    if (hash) {
      setTimeout(() => {
        const el = document.getElementById(hash);
        if (el) {
          const top = el.getBoundingClientRect().top + window.scrollY - 72;
          window.scrollTo({ top, behavior: 'smooth' });
          setActiveSection(hash);
        }
      }, 200);
    }
  }, []);

  useEffect(() => {
    if (view !== 'home') return;
    const sections = ['hero', 'about', 'about-complex', 'catalog', 'floorplan', 'promos', 'features', 'progress', 'construction', 'infrastructure', 'contact'];
    const observer = new IntersectionObserver(
      entries => { entries.forEach(entry => { if (entry.isIntersecting) setActiveSection(entry.target.id); }); },
      { rootMargin: '-40% 0px -40% 0px' }
    );
    sections.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, [view]);

  const leadCtx = useMemo(() => ({ open: (intent) => setLeadIntent(intent || { kind: 'application' }) }), []);

  const leadOverlay = (
    <>
      {leadIntent && <LeadFormModal intent={leadIntent} onClose={() => setLeadIntent(null)} />}
    </>
  );

  if (view === 'docs') {
    return (
      <LeadFormContext.Provider value={leadCtx}>
        <div>
          <Header activeSection="" onNav={handleNav} forceScrolled />
          <DocsPage />
          <Footer />
          {leadOverlay}
        </div>
      </LeadFormContext.Provider>
    );
  }

  if (view === 'apartments') {
    return (
      <LeadFormContext.Provider value={leadCtx}>
      <div>
        <Header activeSection="catalog" onNav={handleNav} forceScrolled />
        <div style={{ paddingTop: 110, paddingBottom: 16, background: 'var(--c-surface)' }}>
          <div className="container">
            <button onClick={goHome} style={{
              padding: '12px 26px 12px 18px', borderRadius: 99,
              background: 'linear-gradient(135deg, #fff, #faf9f7)',
              border: '1.5px solid #e8e5e1',
              fontSize: 13, fontWeight: 700, color: 'var(--c-charcoal)',
              cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 10,
              fontFamily: 'var(--font-body)', letterSpacing: '0.04em',
              textTransform: 'uppercase',
              transition: 'all 240ms cubic-bezier(0.4,0,0.2,1)',
              boxShadow: '0 4px 16px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8)',
              position: 'relative', overflow: 'hidden',
            }}
              onMouseEnter={e => {
                e.currentTarget.style.transform = 'translateX(-3px) translateY(-1px)';
                e.currentTarget.style.borderColor = 'var(--c-brand)';
                e.currentTarget.style.color = 'var(--c-brand)';
                e.currentTarget.style.boxShadow = '0 8px 28px rgba(168,93,63,0.22), inset 0 1px 0 rgba(255,255,255,0.8)';
              }}
              onMouseLeave={e => {
                e.currentTarget.style.transform = 'translateX(0) translateY(0)';
                e.currentTarget.style.borderColor = '#e8e5e1';
                e.currentTarget.style.color = 'var(--c-charcoal)';
                e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8)';
              }}
            >
              <span style={{
                width: 28, height: 28, borderRadius: '50%',
                background: 'linear-gradient(135deg, #B86B4D, #8E4A30)', color: '#fff',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 2px 8px rgba(168,93,63,0.4)',
                flexShrink: 0,
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </span>
              На главную
            </button>
          </div>
        </div>
        <ApartmentCatalog onSelectApt={setSelectedApt} fullPage onBackHome={goHome} />
        <Footer />
        {selectedApt && <ApartmentModal apt={selectedApt} onClose={() => setSelectedApt(null)} />}
        {leadOverlay}
      </div>
      </LeadFormContext.Provider>
    );
  }

  return (
    <LeadFormContext.Provider value={leadCtx}>
    <div>
      <Header activeSection={activeSection} onNav={handleNav} />
      <Hero onNav={handleNav} />
      <div className="reveal"><AboutStrip /></div>
      <div className="reveal"><AboutComplex /></div>
      <div className="tendril-divider on-bone" aria-hidden="true" />
      <div className="reveal"><ApartmentCatalog onSelectApt={setSelectedApt} /></div>
      <div className="tendril-divider on-bone" aria-hidden="true" />
      <div className="reveal"><FloorPlan onSelectApt={setSelectedApt} /></div>
      <div className="reveal"><Promos /></div>
      <div className="reveal"><Features /></div>
      <div className="tendril-divider on-bone" aria-hidden="true" />
      <div className="reveal"><Gallery /></div>
      <div className="reveal"><ConstructionProgress /></div>
      <div className="reveal"><Infrastructure /></div>
      <div className="reveal"><ContactForm /></div>
      <Footer />
      {selectedApt && <ApartmentModal apt={selectedApt} onClose={() => setSelectedApt(null)} />}
      {leadOverlay}
    </div>
    </LeadFormContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
})();
</script>
</body>
</html>
