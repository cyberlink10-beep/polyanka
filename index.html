<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЖК Полянка — Жилой комплекс</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script>
    /* Bootstrap from server: synchronously fetch latest data into localStorage
       before React reads it. Edge runtime keeps this fast (~50–150ms). */
    (function () {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/data', false);
        xhr.timeout = 4000;
        xhr.send();
        if (xhr.status === 200) {
          var data = JSON.parse(xhr.responseText || '{}');
          Object.keys(data).forEach(function (k) {
            try { localStorage.setItem(k, JSON.stringify(data[k])); } catch (e) {}
          });
        }
      } catch (e) { /* offline / first run / cold start — fall back to localStorage */ }
    })();
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" async></script>
  <style>
    @font-face { font-family: 'Dela Gothic One'; src: url('fonts/DelaGothicOne-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'Inter'; src: url('fonts/Inter-Regular.ttf') format('truetype'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ЖК Полянка — brand palette (per BRAND.md, MMXXVI)
         Иерархия: Olive + Bone/Cream = 70% основа · Terracotta 15% акцент · Gold только hairlines */
      --c-olive-deep: #4E5538;   /* Forest Olive — основной бренд-цвет, тёмные секции, лого */
      --c-olive: #6B7350;        /* Sage — сабтексты, eyebrow, тонкие акценты */
      --c-champagne: #EFE4C4;    /* Champagne — реверс на тёмном, тёплый акцент */
      --c-cream: #F7F1E2;        /* Cream — фоны секций, карточки */
      --c-bone: #FAF6EC;         /* Bone — основной фон страницы */
      --c-terracotta: #A85D3F;   /* Terracotta — кирпич фасадов, акцент CTA (до 15%) */
      --c-gold: #B89968;         /* Gold — только hairlines, премиум-линии */
      --c-ink: #1F2014;          /* Ink — основной текст */
      --c-ink-soft: #3A3A2E;     /* Ink Soft — body, вторичный текст */
      --c-line: rgba(31,32,20,0.18);
      --c-line-light: rgba(31,32,20,0.10);

      /* Legacy aliases (используется множеством существующих стилей) */
      --c-brand: var(--c-terracotta);
      --c-brand-dark: #8E4A30;
      --c-brand-mid: #B86B4D;
      --c-sage: var(--c-olive);
      --c-dark: var(--c-ink);
      --c-charcoal: var(--c-ink-soft);
      --c-gray-700: var(--c-ink-soft);
      --c-gray-500: #7D8068;
      --c-gray-300: #C5C2A8;
      --c-gray-100: #EBE3CB;
      --c-surface: var(--c-bone);
      --c-white: #FFFFFF;
      --font-display: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      --max-w: 1280px;
      --r-sm: 4px;
      --r-md: 8px;
      --r-lg: 12px;
      --shadow-md: 0 2px 16px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      background: var(--c-bone);
      color: var(--c-ink-soft);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Pulsing main mark on the Yandex map (Расположение) */
    .polyanka-pulse {
      position: relative;
      width: 56px; height: 56px;
      margin-left: -28px;
      margin-top: -52px;
      pointer-events: auto;
    }
    .polyanka-pulse-ring {
      position: absolute;
      left: 50%; bottom: 0;
      width: 56px; height: 56px;
      transform: translate(-50%, 50%);
      border-radius: 50%;
      background: rgba(168,93,63,0.35);
      animation: polyankaPulse 2.2s cubic-bezier(0.22,1,0.36,1) infinite;
      pointer-events: none;
    }
    .polyanka-pulse-ring-2 {
      animation-delay: 1.1s;
      background: rgba(78,85,56,0.30);
    }
    .polyanka-pulse-icon {
      position: absolute;
      inset: 0;
      width: 56px; height: 56px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.30));
      pointer-events: none;
    }
    @keyframes polyankaPulse {
      0%   { transform: translate(-50%, 50%) scale(0.4); opacity: 0.85; }
      80%  { opacity: 0; }
      100% { transform: translate(-50%, 50%) scale(2.4); opacity: 0; }
    }

    /* Tendril divider — горизонтальный разделитель между секциями */
    .tendril-divider {
      height: 64px;
      background: url('assets/patterns/05-tendril-clear.svg') repeat-x center center;
      background-size: auto 60px;
      opacity: 0.7;
    }
    .tendril-divider.on-bone { background-color: var(--c-bone); }
    .tendril-divider.on-cream { background-color: var(--c-cream); }
    /* Cormorant Garamond Light тонкий — поднимаем дефолт display-шрифта до Regular,
       читается лучше на экранах при средних размерах */
    h1, h2, h3, h4, .display { font-weight: 400; }

    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 40px;
    }
    @media (max-width: 900px)  { .container { padding: 0 28px; } }
    @media (max-width: 600px)  { .container { padding: 0 18px; } }

    /* ─── Responsive grid helpers ─── */
    /* Two-up text/photo split → stack on tablet */
    .resp-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    @media (max-width: 1024px) { .resp-2col { grid-template-columns: 1fr; gap: 48px; } }

    /* AboutStrip 5-up counter band → 2-up on mobile */
    .resp-5stat { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; align-items: center; }
    @media (max-width: 900px) { .resp-5stat { grid-template-columns: repeat(3, 1fr); gap: 20px; row-gap: 28px; } .resp-5stat > * + * { border-left: none !important; } }
    @media (max-width: 520px) { .resp-5stat { grid-template-columns: repeat(2, 1fr); } }

    /* 4-up feature cards in AboutComplex → 2-up on tablet, 1-up on mobile */
    .resp-features4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    @media (max-width: 1024px) { .resp-features4 { grid-template-columns: repeat(2, 1fr); } .resp-features4 > * { border-left: none !important; border-top: 1px solid rgba(184,153,104,0.18); } .resp-features4 > *:nth-child(odd) { border-left: none !important; } }
    @media (min-width: 601px) and (max-width: 1024px) { .resp-features4 > *:nth-child(2n) { border-left: 1px solid rgba(184,153,104,0.18) !important; } .resp-features4 > *:nth-child(-n+2) { border-top: none !important; } }
    @media (max-width: 600px)  { .resp-features4 { grid-template-columns: 1fr; } .resp-features4 > *:first-child { border-top: none !important; } }

    /* Gallery: main image + side rail → stacked rail under image */
    .resp-gallery { display: grid; grid-template-columns: 1fr 280px; gap: 16px; }
    @media (max-width: 900px) { .resp-gallery { grid-template-columns: 1fr; } .resp-gallery > :last-child { flex-direction: row !important; max-height: none !important; overflow-x: auto !important; } }

    /* Construction photos 3-up → 2 → 1 */
    .resp-photos3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 900px) { .resp-photos3 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .resp-photos3 { grid-template-columns: 1fr; } }

    /* Infrastructure places 3-up → 2 → 1 */
    .resp-places3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 900px) { .resp-places3 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .resp-places3 { grid-template-columns: 1fr; } }

    /* Footer 1fr auto → 1 fr (stacked) */
    @media (max-width: 900px) {
      .footer-top { grid-template-columns: 1fr !important; gap: 28px !important; }
      .footer-contacts { grid-template-columns: 1fr !important; gap: 14px !important; }
      .footer-contacts > div:nth-child(2) { display: none !important; }
      .footer-contacts > .btn { justify-self: start; margin-top: 4px; }
    }
    @media (max-width: 520px) {
      .footer-top { gap: 22px !important; }
    }

    /* Contact form 1fr 1fr → 1 fr */
    .resp-contact { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    @media (max-width: 900px) { .resp-contact { grid-template-columns: 1fr; gap: 48px; } }

    /* Hide on small screens (desktop-only nav etc) */
    @media (max-width: 900px) {
      .hide-mobile { display: none !important; }
      .hide-mobile-flex { display: none !important; }
      /* Tighter vertical rhythm — only for content sections, leave hero/strip alone */
      section[id]:not(#hero):not(#about) { padding-top: 72px !important; padding-bottom: 72px !important; }
    }
    @media (max-width: 600px) {
      section[id]:not(#hero):not(#about) { padding-top: 56px !important; padding-bottom: 56px !important; }
      /* Section headers stack cleanly */
      section h2 { font-size: clamp(28px, 7vw, 40px) !important; line-height: 1.1 !important; }
      .tendril-divider { height: 48px !important; background-size: auto 44px !important; }
    }

    /* Hamburger menu — mobile only */
    .burger {
      display: none;
      width: 40px; height: 40px;
      align-items: center; justify-content: center;
      background: transparent; border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px; cursor: pointer; padding: 0;
      transition: background 180ms;
    }
    .burger:hover { background: rgba(255,255,255,0.08); }
    .burger svg { display: block; }
    @media (max-width: 900px) { .burger { display: inline-flex; } }

    /* Mobile drawer */
    .mobile-drawer {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(20,17,14,0.96);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      display: flex; flex-direction: column;
      padding: 80px 32px 32px;
      animation: drawerIn 240ms cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes drawerIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .mobile-drawer-close {
      position: absolute; top: 22px; right: 22px;
      width: 40px; height: 40px; border-radius: 8px;
      background: transparent; border: 1px solid rgba(255,255,255,0.25);
      color: #fff; cursor: pointer; font-size: 18px; line-height: 1;
    }
    .mobile-drawer-link {
      font-family: var(--font-display); font-weight: 500; font-size: 24px;
      color: rgba(255,255,255,0.85); text-decoration: none;
      padding: 14px 4px; border-bottom: 1px solid rgba(239,228,196,0.10);
      cursor: pointer; transition: color 180ms;
      letter-spacing: -0.01em;
    }
    .mobile-drawer-link:hover { color: var(--c-gold); }
    .mobile-drawer-phone {
      margin-top: 28px; padding: 16px 0 8px;
      font-family: var(--font-display); font-style: italic;
      font-size: 22px; color: var(--c-gold);
      border-top: 1px solid rgba(239,228,196,0.18);
      text-decoration: none;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      padding: 13px 28px;
      transition: all 220ms cubic-bezier(0.22,1,0.36,1);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    /* Ripple */
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple-anim 550ms ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    .btn-primary {
      background: linear-gradient(135deg, #B86B4D 0%, #A85D3F 50%, #8E4A30 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(168,93,63,0.40);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 220ms;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(168,93,63,0.55); }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: scale(0.97) translateY(0); box-shadow: 0 2px 8px rgba(168,93,63,0.3); }

    .btn-secondary {
      background: transparent;
      color: var(--c-brand);
      border: 1.5px solid var(--c-brand);
    }
    .btn-secondary:hover {
      background: var(--c-brand);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(168,93,63,0.35);
    }
    .btn-secondary:active { transform: scale(0.97); }

    .btn-dark { background: var(--c-dark); color: #fff; }
    .btn-dark:hover { background: var(--c-charcoal); transform: translateY(-2px); }
    .btn-lg { padding: 17px 40px; font-size: 15px; }

    /* Hero-specific ghost button */
    .btn-hero-ghost {
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.45);
      backdrop-filter: blur(4px);
    }
    .btn-hero-ghost:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.8);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .btn-hero-ghost:active { transform: scale(0.97); }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 4px 20px rgba(168,93,63,0.4); }
      50% { box-shadow: 0 4px 28px rgba(168,93,63,0.75), 0 0 0 6px rgba(168,93,63,0.12); }
    }

    /* Phone number shimmer */
    .phone-link {
      position: relative;
      background: linear-gradient(90deg, #fff 0%, #fff 40%, var(--c-brand) 50%, #fff 60%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: phone-shimmer 3.5s linear infinite;
    }
    .phone-link:hover {
      animation: phone-shimmer 1.2s linear infinite;
      filter: drop-shadow(0 0 8px rgba(168,93,63,0.7));
    }
    @keyframes phone-shimmer {
      0%   { background-position: 100% center; }
      100% { background-position: -100% center; }
    }

    /* Enhanced call button */
    .btn-call {
      animation: pulse-glow 2.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .btn-call::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      animation: btn-sweep 3s ease-in-out infinite;
      border-radius: inherit;
    }
    @keyframes btn-sweep {
      0%   { left: -100%; }
      40%, 100% { left: 140%; }
    }

    /* Ken Burns hero bg */
    @keyframes kenburns {
      0%   { transform: scale(1.08) translate(0, 0); }
      50%  { transform: scale(1.13) translate(-1%, -0.5%); }
      100% { transform: scale(1.08) translate(0, 0); }
    }

    /* Hero text reveal */
    @keyframes heroSlideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-line { animation: heroSlideUp 0.8s cubic-bezier(0.22,1,0.36,1) both; }
    .hero-line-1 { animation-delay: 0.15s; }
    .hero-line-2 { animation-delay: 0.30s; }
    .hero-line-3 { animation-delay: 0.45s; }
    .hero-line-4 { animation-delay: 0.60s; }
    .hero-line-5 { animation-delay: 0.78s; }

    /* Floating badge */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--c-gray-300); border-radius: 3px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(20,16,12,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-box {
      background: #fff; border-radius: 16px;
      max-width: 720px; width: 100%;
      overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      max-height: 90vh; overflow-y: auto;
    }

    /* Scroll-reveal */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 600ms cubic-bezier(0.22,1,0.36,1), transform 600ms cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 100ms; }
    .reveal-delay-2 { transition-delay: 200ms; }
    .reveal-delay-3 { transition-delay: 320ms; }
    .reveal-delay-4 { transition-delay: 440ms; }
    .reveal-delay-5 { transition-delay: 560ms; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Modern dual range slider */
    .price-slider-wrap { position: relative; height: 32px; }
    .price-slider-wrap input[type=range] {
      position: absolute; width: 100%; height: 6px;
      -webkit-appearance: none; appearance: none;
      background: transparent; pointer-events: none;
      top: 50%; transform: translateY(-50%); margin: 0;
    }
    .price-slider-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff;
      cursor: grab; pointer-events: all;
      border: 3px solid #A85D3F;
      box-shadow:
        0 5px 14px rgba(168,93,63,0.45),
        0 1px 3px rgba(0,0,0,0.18),
        inset 0 0 0 2px #fff;
      transition: transform 200ms cubic-bezier(0.4,0,0.2,1), box-shadow 200ms;
    }
    .price-slider-wrap input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.18);
      box-shadow:
        0 8px 22px rgba(168,93,63,0.6),
        0 2px 6px rgba(0,0,0,0.22),
        inset 0 0 0 2px #fff;
    }
    .price-slider-wrap input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; }
    .price-slider-wrap input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff;
      cursor: grab; pointer-events: all;
      border: 3px solid #A85D3F;
      box-shadow: 0 5px 14px rgba(168,93,63,0.45);
    }

    /* Nav link hover effect */
    .nav-link {
      position: relative;
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      padding-bottom: 4px;
      transition: color 200ms ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      width: 0; height: 2px;
      background: var(--c-brand);
      border-radius: 2px;
      transition: width 250ms cubic-bezier(0.22,1,0.36,1), left 250ms cubic-bezier(0.22,1,0.36,1);
    }
    .nav-link:hover::after,
    .nav-link.active::after { width: 100%; left: 0; }
    .nav-link:hover { color: #fff !important; }
    .nav-link.active { color: var(--c-brand) !important; }

    /* Logo hover */
    .logo-wrap {
      cursor: pointer;
      transition: transform 250ms cubic-bezier(0.22,1,0.36,1), opacity 200ms;
    }
    .logo-wrap:hover { transform: scale(1.04); opacity: 0.92; }
    .logo-wrap:active { transform: scale(0.98); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ─── BOOTSTRAP FROM SERVER (async, gates React render) ───
   Deep-merges server payload into localStorage. NEVER wipes local-only
   sub-keys that the server doesn't have yet (e.g. unsynced floor polygons). */
function __deepMerge(local, server) {
  if (server == null) return local;
  if (local == null) return server;
  if (Array.isArray(local) && Array.isArray(server)) {
    const byId = new Map();
    for (const x of local) if (x && x.id != null) byId.set(x.id, x);
    for (const x of server) {
      if (x && x.id != null) {
        const ex = byId.get(x.id);
        byId.set(x.id, ex ? __deepMerge(ex, x) : x);
      }
    }
    if (byId.size > 0) return Array.from(byId.values()).sort((a,b)=>(a.id||0)-(b.id||0));
    return server;
  }
  if (typeof local === 'object' && typeof server === 'object' && !Array.isArray(local) && !Array.isArray(server)) {
    const out = { ...local };
    for (const k of Object.keys(server)) out[k] = __deepMerge(out[k], server[k]);
    return out;
  }
  return server;
}
async function __bootstrapFromServer() {
  let data = null;
  try {
    const r = await fetch('/api/data', { cache: 'no-store' });
    if (!r.ok) return;
    data = await r.json();
  } catch (e) { return; }
  if (!data || typeof data !== 'object') return;
  Object.keys(data).forEach(k => {
    try {
      const existing = localStorage.getItem(k);
      let merged = data[k];
      if (existing) {
        try {
          const local = JSON.parse(existing);
          merged = __deepMerge(local, data[k]);
        } catch {}
      }
      localStorage.setItem(k, JSON.stringify(merged));
    } catch (e) {}
  });
}

/* ─── RIPPLE HELPER ─── */
function addRipple(e) {
  const btn = e.currentTarget;
  const r = btn.getBoundingClientRect();
  const size = Math.max(r.width, r.height) * 2;
  const x = e.clientX - r.left - size / 2;
  const y = e.clientY - r.top - size / 2;
  const span = document.createElement('span');
  span.className = 'ripple';
  span.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(span);
  span.addEventListener('animationend', () => span.remove());
}

/* Global body-scroll lock — counts nested modals so closing one
   modal while another is still open doesn't accidentally re-lock
   or wrongly restore overflow. */
let __scrollLockCount = 0;
let __scrollLockPrev = '';
function useBodyScrollLock(active) {
  useEffect(() => {
    if (!active) return;
    if (__scrollLockCount === 0) {
      __scrollLockPrev = document.body.style.overflow;
      document.body.style.overflow = 'hidden';
    }
    __scrollLockCount++;
    return () => {
      __scrollLockCount = Math.max(0, __scrollLockCount - 1);
      if (__scrollLockCount === 0) {
        document.body.style.overflow = __scrollLockPrev || '';
      }
    };
  }, [active]);
}

/* Russian plural helper: pluralRu(n, ['квартира','квартиры','квартир']) */
function pluralRu(n, forms) {
  const num = Math.abs(Number(n) || 0);
  const mod10 = num % 10;
  const mod100 = num % 100;
  if (mod100 >= 11 && mod100 <= 14) return forms[2];
  if (mod10 === 1) return forms[0];
  if (mod10 >= 2 && mod10 <= 4) return forms[1];
  return forms[2];
}

const HOME_INITIAL = 8, HOME_EXPANDED = 12;
const FULL_INITIAL = 16, FULL_STEP = 16;

function ApartmentCatalog({ onSelectApt, fullPage = false, onShowAll, onBackHome }) {
  const [roomsFilter, setRoomsFilter] = useState(null);
  const [sortBy, setSortBy] = useState('price-asc');
  // Snap min/max to step grid so the slider can always reach actual extremes
  const PRICE_STEP = 50000;
  const minBound = Math.floor(Math.min(...APARTMENTS.map(a => a.price)) / PRICE_STEP) * PRICE_STEP;
  const maxBound = Math.ceil (Math.max(...APARTMENTS.map(a => a.price)) / PRICE_STEP) * PRICE_STEP;
  const minArea = Math.floor(Math.min(...APARTMENTS.map(a => a.area)));
  const maxArea = Math.ceil(Math.max(...APARTMENTS.map(a => a.area)));
  const [priceRange, setPriceRange] = useState([minBound, maxBound]);
  const [areaRange, setAreaRange] = useState([minArea, maxArea]);
  const [revealed, setRevealed] = useState(fullPage ? FULL_INITIAL : HOME_INITIAL);
  const [shuffleTick, setShuffleTick] = useState(0);

  // Reset visible count and reshuffle when filters change
  useEffect(() => {
    setRevealed(fullPage ? FULL_INITIAL : HOME_INITIAL);
    setShuffleTick(t => t + 1);
  }, [roomsFilter, priceRange[0], priceRange[1], areaRange[0], areaRange[1], fullPage]);

  const filtered = APARTMENTS
    .filter(a => {
      // Проданные и забронированные квартиры в каталог не попадают
      if (a.available === false) return false;
      if (roomsFilter && a.rooms !== roomsFilter) return false;
      if (a.price < priceRange[0]) return false;
      if (a.price > priceRange[1]) return false;
      if (a.area < areaRange[0]) return false;
      if (a.area > areaRange[1]) return false;
      return true;
    })
    .sort((a, b) => {
      if (sortBy === 'price-asc') return a.price - b.price;
      if (sortBy === 'price-desc') return b.price - a.price;
      if (sortBy === 'area-asc') return a.area - b.area;
      if (sortBy === 'area-desc') return b.area - a.area;
      return 0;
    });

  // Initial mix: 3×1k + 3×2k + 2×3k randomly ordered (only on home + no rooms filter)
  const ordered = useMemo(() => {
    if (fullPage || roomsFilter) return filtered;
    const shuffle = arr => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };
    const r1 = shuffle(filtered.filter(x => x.rooms === 1)).slice(0, 3);
    const r2 = shuffle(filtered.filter(x => x.rooms === 2)).slice(0, 3);
    const r3 = shuffle(filtered.filter(x => x.rooms === 3)).slice(0, 2);
    const mix = shuffle([...r1, ...r2, ...r3]);
    const mixIds = new Set(mix.map(a => a.id));
    const rest = filtered.filter(a => !mixIds.has(a.id));
    return [...mix, ...rest];
  }, [shuffleTick, fullPage, roomsFilter, sortBy]);

  const visible = ordered.slice(0, revealed);
  const total = ordered.length;
  const canShowMore = revealed < total;

  const fmtPrice = v => `${(v / 1000000).toFixed(2).replace(/\.?0+$/, '')} млн ₽`;
  const fillL = (priceRange[0] - minBound) / (maxBound - minBound) * 100;
  const fillR = (priceRange[1] - minBound) / (maxBound - minBound) * 100;
  const aFillL = (areaRange[0] - minArea) / (maxArea - minArea) * 100;
  const aFillR = (areaRange[1] - minArea) / (maxArea - minArea) * 100;

  return (
    <section id="catalog" style={{ padding: '96px 0', background: 'var(--c-surface)' }}>
      <div className="container">
        <div style={{ marginBottom: 48 }}>
          <div style={{ fontSize: 12, letterSpacing: '0.32em', textTransform: 'uppercase', color: 'var(--c-olive)', marginBottom: 12, fontWeight: 600 }}>
            — II · Каталог квартир —
          </div>
          <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 'clamp(36px, 4.5vw, 56px)', color: 'var(--c-charcoal)', lineHeight: 1.05, letterSpacing: '-0.005em' }}>
            Выберите <em style={{ fontStyle: 'italic', color: 'var(--c-olive-deep)' }}>свою</em> квартиру<em style={{ fontStyle: 'italic', color: 'var(--c-terracotta)', fontWeight: 500 }}>.</em>
          </h2>
        </div>

        {/* Filter bar */}
        <div style={{
          background: '#fff', borderRadius: 20, marginBottom: 36,
          boxShadow: '0 4px 40px rgba(0,0,0,0.09)',
          overflow: 'hidden',
          border: '1px solid rgba(0,0,0,0.05)',
        }}>
          {/* Top accent line */}
          <div style={{ height: 3, background: 'linear-gradient(90deg, #B86B4D 0%, #A85D3F 50%, rgba(168,93,63,0.2) 100%)' }} />

          <div style={{ padding: '22px 28px', display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 28, alignItems: 'center' }}>

            {/* Rooms — Cormorant italic pills in brand voice */}
            <div style={{ display: 'flex', gap: 8 }}>
              {[
                { v: null, l: 'Все' },
                { v: 1, l: '1-комн.' },
                { v: 2, l: '2-комн.' },
                { v: 3, l: '3-комн.' },
              ].map(r => {
                const active = roomsFilter === r.v;
                return (
                  <button key={r.v} onClick={() => setRoomsFilter(r.v)}
                    style={{
                      padding: '10px 22px', borderRadius: 99,
                      fontFamily: 'var(--font-display)', fontStyle: 'italic',
                      fontSize: 17, fontWeight: 600,
                      cursor: 'pointer', letterSpacing: '0.005em', lineHeight: 1,
                      border: '1.5px solid',
                      borderColor: active ? 'var(--c-brand)' : 'var(--c-gray-100)',
                      transition: 'all 240ms cubic-bezier(.4,0,.2,1)',
                      background: active ? 'linear-gradient(135deg,#B86B4D,#8E4A30)' : '#fff',
                      color: active ? '#fff' : 'var(--c-olive-deep)',
                      boxShadow: active
                        ? '0 6px 20px rgba(168,93,63,0.38), 0 2px 6px rgba(168,93,63,0.2)'
                        : '0 1px 3px rgba(0,0,0,0.04)',
                      transform: active ? 'translateY(-2px) scale(1.04)' : 'translateY(0) scale(1)',
                    }}
                    onMouseEnter={e => {
                      if (!active) {
                        e.currentTarget.style.borderColor = 'var(--c-brand)';
                        e.currentTarget.style.color = 'var(--c-brand)';
                        e.currentTarget.style.boxShadow = '0 4px 18px rgba(168,93,63,0.22)';
                        e.currentTarget.style.transform = 'translateY(-2px) scale(1.04)';
                      }
                    }}
                    onMouseLeave={e => {
                      if (!active) {
                        e.currentTarget.style.borderColor = 'var(--c-gray-100)';
                        e.currentTarget.style.color = 'var(--c-olive-deep)';
                        e.currentTarget.style.boxShadow = '0 1px 3px rgba(0,0,0,0.04)';
                        e.currentTarget.style.transform = 'translateY(0) scale(1)';
                      }
                    }}
                  >{r.l}</button>
                );
              })}
            </div>

            {/* Stacked sliders — стоимость + площадь, modern look */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 18, padding: '0 12px' }}>
              {/* Стоимость */}
              <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr 200px', gap: 18, alignItems: 'center' }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 600, fontSize: 18, color: 'var(--c-ink)' }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--c-gold)', boxShadow: '0 0 8px rgba(184,153,104,0.5)' }} />
                  Стоимость
                </span>
                <div className="price-slider-wrap">
                  <div style={{ position:'absolute', top:'50%', left:0, right:0, height:6, transform:'translateY(-50%)', borderRadius:99, background:'#ede9e5' }} />
                  <div style={{ position:'absolute', top:'50%', height:6, left:`${fillL}%`, right:`${100-fillR}%`, transform:'translateY(-50%)', borderRadius:99, background:'linear-gradient(90deg,#B86B4D,#A85D3F)', boxShadow:'0 0 14px rgba(168,93,63,0.4)' }} />
                  <input type="range" min={minBound} max={maxBound} step={50000} value={priceRange[0]}
                    onChange={e => { const v=Number(e.target.value); if(v<priceRange[1]-100000) setPriceRange([v,priceRange[1]]); }}
                    style={{ zIndex: priceRange[0] > maxBound-(maxBound-minBound)*0.1 ? 5 : 3 }} />
                  <input type="range" min={minBound} max={maxBound} step={50000} value={priceRange[1]}
                    onChange={e => { const v=Number(e.target.value); if(v>priceRange[0]+100000) setPriceRange([priceRange[0],v]); }}
                    style={{ zIndex: 4 }} />
                </div>
                <span style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 600, fontSize: 18, color: 'var(--c-ink)', textAlign: 'right', letterSpacing: '-0.005em', whiteSpace: 'nowrap', lineHeight: 1.2 }}>
                  {fmtPrice(priceRange[0])}<span style={{ color: 'var(--c-gold)', margin: '0 8px', fontStyle: 'normal', fontWeight: 400 }}>—</span>{fmtPrice(priceRange[1])}
                </span>
              </div>

              {/* Площадь */}
              <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr 200px', gap: 18, alignItems: 'center' }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 600, fontSize: 18, color: 'var(--c-ink)' }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--c-gold)', boxShadow: '0 0 8px rgba(184,153,104,0.5)' }} />
                  Площадь
                </span>
                <div className="price-slider-wrap">
                  <div style={{ position:'absolute', top:'50%', left:0, right:0, height:6, transform:'translateY(-50%)', borderRadius:99, background:'#ede9e5' }} />
                  <div style={{ position:'absolute', top:'50%', height:6, left:`${aFillL}%`, right:`${100-aFillR}%`, transform:'translateY(-50%)', borderRadius:99, background:'linear-gradient(90deg,#B86B4D,#A85D3F)', boxShadow:'0 0 14px rgba(168,93,63,0.4)' }} />
                  <input type="range" min={minArea} max={maxArea} step={1} value={areaRange[0]}
                    onChange={e => { const v=Number(e.target.value); if(v<areaRange[1]-1) setAreaRange([v,areaRange[1]]); }}
                    style={{ zIndex: areaRange[0] > maxArea-(maxArea-minArea)*0.1 ? 5 : 3 }} />

/* ─── FLOOR PLAN ─── */
function genFloor(floor, korpus) {
  const seed = floor * 7 + korpus * 13;
  const layouts = [
    { rooms: 1, area: 36, side: 'left' },
    { rooms: 1, area: 42, side: 'left' },
    { rooms: 2, area: 58, side: 'center' },
    { rooms: 2, area: 64, side: 'center' },
    { rooms: 3, area: 78, side: 'right' },
    { rooms: 3, area: 86, side: 'right' },
    { rooms: 1, area: 34, side: 'right' },
  ];
  return layouts.map((l, i) => ({
    ...l,
    id: `${korpus}-${floor}-${i}`,
    floor,
    korpus,
    available: (seed + i * 3) % 5 !== 0,
    price: Math.round((l.area * 78000 + floor * 12000) / 10000) * 10000,
    apt: `${(floor - 1) * 7 + i + 1}`,
  }));
}

/* Building elevation step — stylized SVG with hoverable floors */
function FloorElevation({ korpus, hovered, onHover, onSelect }) {
  const F = korpus.floors;
  const W = 280, H = 480, top = 24;
  const fh = (H - top) / F;
  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${W + 60} ${H + 30}`} preserveAspectRatio="xMidYMid meet" style={{ maxHeight: 540 }}>
      <defs>
        <linearGradient id="bldgGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#1f1a14" />
          <stop offset="100%" stopColor="#15110d" />
        </linearGradient>
        <linearGradient id="winLit" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#ffd28a" />
          <stop offset="100%" stopColor="#A85D3F" />
        </linearGradient>
      </defs>
      {/* Base/ground line */}
      <line x1="20" y1={top + H} x2={W + 50} y2={top + H} stroke="rgba(255,255,255,0.1)" strokeWidth="1" />
      {/* Roof */}
      <rect x="36" y={top - 8} width={W - 12} height="8" rx="2" fill="#0c0a08" stroke="rgba(255,255,255,0.08)" strokeWidth="0.8" />
      {/* Building body */}
      <rect x="40" y={top} width={W - 20} height={H} fill="url(#bldgGrad)" stroke="rgba(255,255,255,0.08)" strokeWidth="0.8" />

      {/* Floors */}
      {Array.from({ length: F }, (_, i) => {
        const floorNum = F - i;
        const y = top + i * fh;
        const isHover = hovered === floorNum;
        return (
          <g key={floorNum}>
            <rect
              x="40" y={y} width={W - 20} height={fh - 0.5}
              fill={isHover ? 'rgba(168,93,63,0.32)' : 'rgba(255,255,255,0)'}
              stroke={isHover ? '#B86B4D' : 'rgba(255,255,255,0.04)'}
              strokeWidth={isHover ? 1.5 : 0.5}
              style={{ cursor: 'pointer', transition: 'all 220ms' }}
              onMouseEnter={() => onHover(floorNum)}
              onMouseLeave={() => onHover(null)}
              onClick={() => onSelect(floorNum)}
            />
            {/* Windows row */}
            {Array.from({ length: 6 }, (_, j) => (
              <rect key={j}
                x={56 + j * ((W - 50) / 6)} y={y + fh * 0.2}
                width={(W - 50) / 6 - 6} height={fh * 0.55}
                rx="1"
                fill={isHover ? 'url(#winLit)' : 'rgba(255,255,255,0.18)'}
                style={{ pointerEvents: 'none', transition: 'fill 220ms' }}
              />
            ))}
            {/* Floor number */}
            <text x="22" y={y + fh / 2 + 4} fontSize="11" fontWeight="600"
              fill={isHover ? '#B86B4D' : 'rgba(255,255,255,0.5)'}
              fontFamily="var(--font-body)" style={{ transition: 'fill 220ms' }}>{floorNum}</text>
            {/* Floor separator */}
            <line x1="40" y1={y + fh} x2={W + 20} y2={y + fh} stroke="rgba(255,255,255,0.06)" strokeWidth="0.4" />
          </g>
        );
      })}
    </svg>
  );
}

function FloorPlan({ onSelectApt }) {
  const leadForm = useLeadForm();
  // step: 0 = korpus · 'entrance' = подъезд · 1 = этаж · 2 = квартира
  const [step, setStep] = useState(0);
  const [korpus, setKorpus] = useState(null);
  const [entrance, setEntrance] = useState(null);
  const [floor, setFloor] = useState(null);
  const [hoveredKorpus, setHoveredKorpus] = useState(null);
  const [hoveredEntrance, setHoveredEntrance] = useState(null);
  const [hoveredFloor, setHoveredFloor] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [selectedApt, setSelectedApt] = useState(null);
  const [filterRooms, setFilterRooms] = useState(null);
  const [filterAvail, setFilterAvail] = useState('all');
  const FLOORS = 12;

  const KORPUSES = KORPUSES_DATA;

  const goKorpus = k => {
    setKorpus(k); setEntrance(null); setFloor(null); setSelectedApt(null);
    const ents = Array.isArray(k.entrances) ? k.entrances : [];
    if (ents.length > 1) setStep('entrance');
    else { setEntrance(ents[0] || null); setStep(1); }
  };
  const goEntrance = e => { setEntrance(e); setFloor(null); setSelectedApt(null); setStep(1); };
  const goFloor    = f => { setFloor(f); setSelectedApt(null); setStep(2); };
  const goBackTo = (s) => {
    if (s === 0) { setStep(0); setKorpus(null); setEntrance(null); setFloor(null); setSelectedApt(null); }
    else if (s === 'entrance' && korpus) {
      const ents = Array.isArray(korpus.entrances) ? korpus.entrances : [];
      if (ents.length > 1) { setStep('entrance'); setEntrance(null); setFloor(null); setSelectedApt(null); }
      else { setStep(1); setFloor(null); setSelectedApt(null); }
    }
    else if (s === 1 && korpus) { setStep(1); setFloor(null); setSelectedApt(null); }
  };

  // Step 2 data
  // Use real apartments if floor schema exists, otherwise fall back to procedural FloorMap
  const hasSchema = korpus && floor && korpus.floorSchemas && korpus.floorSchemas[floor];
  const realApts = (floor && korpus)
    ? APARTMENTS.filter(a => {
        if (a.korpus !== korpus.id) return false;
        if (Number(a.floor) !== Number(floor)) return false;
        // If an entrance is selected and the apartment specifies one — they must match.
        // Apartments without entrance metadata are shown regardless (legacy data).
        if (entrance && a.entrance != null && a.entrance !== entrance.id) return false;
        return true;
      })
    : [];
  const allApts = floor && korpus
    ? (hasSchema ? realApts : genFloor(floor, korpus.id))
    : [];
  const filtered = allApts.filter(a => {
    if (filterRooms && a.rooms !== filterRooms) return false;
    if (filterAvail === 'free' && !a.available) return false;
    if (filterAvail === 'booked' && a.available) return false;
    return true;
  });
  const stats = allApts.reduce((acc, a) => { acc.total++; if (a.available) acc.free++; else acc.booked++; return acc; }, { total: 0, free: 0, booked: 0 });

  const Crumb = ({ n, label, value, isActive, isDone, clickable, onClick }) => (
    <div onClick={clickable ? onClick : undefined} style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '12px 18px',
      borderRadius: 12, cursor: clickable ? 'pointer' : 'default',
      background: isActive ? 'rgba(168,93,63,0.06)' : isDone ? '#faf9f7' : '#fff',
      border: '1px solid', borderColor: isActive ? 'rgba(168,93,63,0.4)' : isDone ? '#ece9e5' : '#f0eeea',
      transition: 'all 200ms', flex: 1, minWidth: 160,
    }}>
      <div style={{
        width: 34, height: 34, borderRadius: '50%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 700,
        background: isActive ? 'linear-gradient(135deg,#B86B4D,#8E4A30)' : isDone ? 'rgba(168,93,63,0.14)' : '#f0eeea',
        color: isActive ? '#fff' : isDone ? '#A85D3F' : '#bbb',
        boxShadow: isActive ? '0 4px 14px rgba(168,93,63,0.32)' : 'none',
        flexShrink: 0,
      }}>{isDone ? '✓' : n}</div>
      <div style={{ overflow: 'hidden' }}>
        <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--c-gray-500)' }}>{label}</div>
        <div style={{ fontSize: 15, fontWeight: 600, marginTop: 3, color: isActive || isDone ? 'var(--c-charcoal)' : '#bbb', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {value || '—'}
        </div>
      </div>
    </div>
  );

  return (
    <section id="floorplan" style={{ padding: '96px 0', background: 'var(--c-surface)', position: 'relative' }}>
      <div className="container" style={{ position: 'relative' }}>
        <div style={{ marginBottom: 36 }}>
          <div style={{ fontSize: 12, letterSpacing: '0.32em', textTransform: 'uppercase', color: 'var(--c-olive)', marginBottom: 12, fontWeight: 600 }}>
            — III · Интерактивный выбор —
          </div>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(32px,4vw,48px)', textTransform: 'uppercase', color: 'var(--c-charcoal)', lineHeight: 1.05 }}>
            Планировки по этажам
          </h2>
        </div>

        {/* Breadcrumbs */}
        {(() => {
          const hasEntrances = Array.isArray(korpus?.entrances) && korpus.entrances.length > 1;
          const stepIdx = step === 0 ? 0 : step === 'entrance' ? 1 : step === 1 ? (hasEntrances ? 2 : 1) : (hasEntrances ? 3 : 2);
          const isDone = (i) => stepIdx > i;
          const isActive = (i) => stepIdx === i;
          return (
            <div style={{ display: 'flex', alignItems: 'stretch', gap: 8, marginBottom: 28, flexWrap: 'wrap' }}>
              <Crumb n={1} label="Шаг 1 · Корпус"   value={korpus?.name}                  isActive={isActive(0)} isDone={isDone(0)} clickable={isDone(0)}                 onClick={() => goBackTo(0)} />
              {hasEntrances && (
                <Crumb n={2} label="Шаг 2 · Подъезд" value={entrance?.name}              isActive={isActive(1)} isDone={isDone(1)} clickable={isDone(1) && !!korpus}    onClick={() => goBackTo('entrance')} />
              )}
              <Crumb n={hasEntrances ? 3 : 2} label={`Шаг ${hasEntrances ? 3 : 2} · Этаж`} value={floor ? `${floor} этаж` : null} isActive={isActive(hasEntrances ? 2 : 1)} isDone={isDone(hasEntrances ? 2 : 1)} clickable={isDone(hasEntrances ? 2 : 1) && !!korpus} onClick={() => goBackTo(1)} />
              <Crumb n={hasEntrances ? 4 : 3} label={`Шаг ${hasEntrances ? 4 : 3} · Квартира`} value={selectedApt ? `${selectedApt.area} м² · ${selectedApt.rooms}-к` : null} isActive={isActive(hasEntrances ? 3 : 2)} isDone={false} clickable={false} />
            </div>
          );
        })()}

        {/* ─── STEPS 0 / "entrance" / 1 — Cinematic photo with camera fly-in ─── */}
        {(step === 0 || step === 'entrance' || step === 1) && (() => {
          // Camera transform: zoom into selected korpus polygon, centered in viewport
          const cameraStyle = (k) => {
            if (!k) return { transform: 'scale(1) translate(0%, 0%)', transformOrigin: '50% 50%' };
            const pts = (k.polygon || '').split(/\s+/).map(p => p.split(',').map(Number)).filter(p => p.length === 2 && !isNaN(p[0]));
            if (pts.length < 2) return { transform: 'scale(1) translate(0%, 0%)', transformOrigin: '50% 50%' };
            const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
            const bw = Math.max(maxX - minX, 1), bh = Math.max(maxY - minY, 1);
            const scaleX = 100 / (bw * 1.13 + 4);
            const scaleY = 56.25 / (bh * 1.13 + 4);
            const scale = Math.max(1, Math.min(scaleX, scaleY, 3.9));
            // shift building center to viewport center (in % of image)
            const tx = 50 - cx;                       // % of image width
            const ty = 50 - (cy / 56.25) * 100;       // % of image height
            return {
              transform: `scale(${scale}) translate(${tx}%, ${ty}%)`,
              transformOrigin: '50% 50%',
            };
          };
          const camera = cameraStyle((step === 1 || step === 'entrance') ? korpus : null);
          return (
            <div style={{ animation: step === 0 ? 'fadeUp 350ms ease-out' : 'none' }}>
              <div style={{
                position: 'relative', borderRadius: 18, overflow: 'hidden',
                border: '1px solid #ece9e5',
                boxShadow: '0 12px 40px rgba(0,0,0,0.12)',
                background: '#f5f3ef',
              }}>
                {/* Back button — for Step 1 (floor) and Step 'entrance' */}
                {(step === 1 || step === 'entrance') && (() => {
                  const hasEnt = Array.isArray(korpus?.entrances) && korpus.entrances.length > 1;
                  const backTo = step === 'entrance' ? 0 : (hasEnt ? 'entrance' : 0);
                  const backLabel = step === 'entrance' ? 'К выбору корпуса' : (hasEnt ? 'К выбору подъезда' : 'К выбору корпуса');
                  return (
                  <button onClick={() => goBackTo(backTo)} style={{
                    position: 'absolute', top: 24, left: 24, zIndex: 6,
                    padding: '10px 18px 10px 14px', borderRadius: 99,
                    background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(12px)',
                    border: '1px solid rgba(0,0,0,0.06)',
                    boxShadow: '0 6px 22px rgba(0,0,0,0.14)',
                    fontSize: 13, fontWeight: 600, color: 'var(--c-charcoal)',
                    cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8,
                    fontFamily: 'var(--font-body)',
                    transition: 'all 200ms cubic-bezier(0.4,0,0.2,1)',
                    animation: 'fadeUp 500ms ease-out 800ms backwards',
                  }}
                    onMouseEnter={e => { e.currentTarget.style.transform = 'translateX(-2px)'; e.currentTarget.style.boxShadow = '0 8px 26px rgba(0,0,0,0.18)'; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = 'translateX(0)'; e.currentTarget.style.boxShadow = '0 6px 22px rgba(0,0,0,0.14)'; }}
                  >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                      <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    {backLabel}
                  </button>
                  );
                })()}
                {/* Zoomable layer — camera transform applied here */}
                <div style={{
                  position: 'relative',
                  ...camera,
                  transition: 'transform 1200ms cubic-bezier(0.65, 0, 0.35, 1)',
                  willChange: 'transform',
                }}>
                  <img src={SITE_RENDER} alt="" style={{ width: '100%', display: 'block' }} draggable={false} />
                  <svg viewBox="0 0 100 56.25" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
                    {/* STEP 0: korpus polygons */}
                    {step === 0 && KORPUSES.map(k => {
                      const isHover = hoveredKorpus === k.id;
                      return (
                        <polygon key={k.id}
                          points={k.polygon}
                          fill={isHover ? 'rgba(168,93,63,0.30)' : 'rgba(255,255,255,0.001)'}
                          stroke={isHover ? '#B86B4D' : 'transparent'}
                          strokeWidth={isHover ? 0.4 : 0}
                          style={{ cursor: 'pointer', transition: 'all 220ms', filter: isHover ? 'drop-shadow(0 0 6px rgba(168,93,63,0.55))' : 'none' }}
                          onMouseEnter={() => setHoveredKorpus(k.id)}
                          onMouseLeave={() => setHoveredKorpus(null)}
                          onClick={() => goKorpus(k)}
                        />
                      );
                    })}

                    {/* STEP "entrance" / 1: shared dim mask outside korpus */}
                    {(step === 'entrance' || step === 1) && korpus && (
                      <>
                        <defs>
                          <mask id="korpusMask">
                            <rect x="0" y="0" width="100" height="56.25" fill="white" />
                            <polygon points={korpus.polygon} fill="black" />
                          </mask>
                        </defs>
                        <rect x="0" y="0" width="100" height="56.25" fill="rgba(20,17,14,0.55)" mask="url(#korpusMask)" pointerEvents="none" style={{ transition: 'fill 600ms ease-out' }} />
                      </>
                    )}

                    {/* STEP "entrance": entrance polygons */}
                    {step === 'entrance' && korpus && (() => {
                      const ents = Array.isArray(korpus.entrances) ? korpus.entrances : [];
                      const ep = korpus.entrancePolygons || {};
                      return ents.map(e => {
                        if (!ep[e.id]) return null;
                        const isHover = hoveredEntrance === e.id;
                        return (
                          <polygon key={e.id}
                            points={ep[e.id]}
                            fill={isHover ? 'rgba(255,240,220,0.42)' : 'rgba(255,255,255,0.06)'}
                            stroke="none"
                            style={{
                              cursor: 'pointer',
                              transition: 'fill 260ms cubic-bezier(.4,0,.2,1), filter 260ms',
                              filter: isHover ? 'drop-shadow(0 0 1.2px rgba(255,210,160,0.9)) drop-shadow(0 0 2.5px rgba(255,180,120,0.6))' : 'none',
                            }}
                            onMouseEnter={() => setHoveredEntrance(e.id)}
                            onMouseLeave={() => setHoveredEntrance(null)}
                            onClick={() => goEntrance(e)}
                          />
                        );
                      });
                    })()}

                    {/* STEP 1: floor polygons (per-entrance with korpus-level fallback) */}
                    {step === 1 && korpus && (() => {
                      const entFp = (entrance && entrance.floorPolygons && Object.keys(entrance.floorPolygons).length)
                        ? entrance.floorPolygons : null;
                      const fp = entFp || korpus.floorPolygons || {};
                      const floorsCount = (entrance && entrance.floors) ? entrance.floors : korpus.floors;
                      const floors = Array.from({ length: floorsCount }, (_, i) => floorsCount - i);
                      return floors.map(f => {
                        if (!fp[f]) return null;
                        const isHover = hoveredFloor === f;
                        return (
                          <polygon key={f}
                            points={fp[f]}
                            fill={isHover ? 'rgba(255,240,220,0.38)' : 'rgba(255,255,255,0.04)'}
                            stroke="none"
                            style={{
                              cursor: 'pointer',
                              transition: 'fill 260ms cubic-bezier(.4,0,.2,1), filter 260ms',
                              filter: isHover ? 'drop-shadow(0 0 1.2px rgba(255,210,160,0.9)) drop-shadow(0 0 2.5px rgba(255,180,120,0.6))' : 'none',
                            }}
                            onMouseEnter={() => setHoveredFloor(f)}
                            onMouseLeave={() => setHoveredFloor(null)}
                            onClick={() => goFloor(f)}
                          />
                        );
                      });
                    })()}
                  </svg>
                </div>

                {/* STEP 0: Hover tooltip — anchored to korpus. Single stable node, position
                    transitions smoothly so it doesn't snap between buildings. */}
                {step === 0 && (() => {
                  const k = hoveredKorpus ? KORPUSES.find(x => x.id === hoveredKorpus) : null;
                  if (!k) return null;
                  return (
                    <div style={{
                      position: 'absolute', top: `${(k.cy / 56.25) * 100}%`, left: `${k.cx}%`,
                      transform: 'translate(-50%, -120%)',
                      background: 'rgba(20,17,14,0.96)', backdropFilter: 'blur(14px)',
                      border: '1px solid rgba(168,93,63,0.45)', borderRadius: 12,
                      padding: '14px 20px', pointerEvents: 'none',
                      boxShadow: '0 16px 40px rgba(0,0,0,0.35), 0 0 22px rgba(168,93,63,0.22)',
                      minWidth: 180, textAlign: 'center', zIndex: 5,
                      transition: 'top 260ms cubic-bezier(0.22,1,0.36,1), left 260ms cubic-bezier(0.22,1,0.36,1), opacity 200ms ease',
                    }}>
                      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 22, color: '#fff', textTransform: 'uppercase', marginBottom: 8 }}>{k.name}</div>
                      <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.75)', marginBottom: 6 }}>{k.floors} {floorWord(k.floors)} · {k.total} {aptWord(k.total)}</div>
                      <div style={{ fontSize: 14, color: '#4ade80', fontWeight: 600 }}>● {k.free} свободно</div>
                    </div>
                  );
                })()}

                {/* STEP "entrance": Floating info card — entrance preview */}
                {step === 'entrance' && korpus && (() => {
                  const ents = Array.isArray(korpus.entrances) ? korpus.entrances : [];
                  const hov = ents.find(e => e.id === hoveredEntrance);
                  return (
                    <div style={{
                      position: 'absolute', top: 24, right: 24, width: 300,
                      background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(16px)',
                      borderRadius: 14, padding: '20px 22px',
                      border: '1px solid rgba(0,0,0,0.06)',
                      boxShadow: '0 12px 36px rgba(0,0,0,0.18)',
                      animation: 'fadeUp 600ms cubic-bezier(0.4,0,0.2,1) 500ms backwards',
                      zIndex: 5,
                    }}>
                      <div style={{ fontSize: 11, letterSpacing: '0.32em', textTransform: 'uppercase', color: 'var(--c-olive)', fontWeight: 600, marginBottom: 6 }}>{korpus.name}</div>
                      {hov ? (
                        <>
                          <div style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 400, fontSize: 26, color: 'var(--c-gold)', lineHeight: 1, marginBottom: 6 }}>— {['I','II','III','IV','V','VI','VII','VIII'][ents.indexOf(hov)] || (ents.indexOf(hov)+1)} —</div>
                          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 26, color: 'var(--c-charcoal)', lineHeight: 1.1, marginBottom: 14 }}>{hov.name}</div>
                          <div style={{ width: 36, height: 1, background: 'var(--c-gold)', opacity: 0.7, marginBottom: 14 }} />
                          <div style={{ fontSize: 13, color: 'var(--c-gray-500)', lineHeight: 1.6 }}>
                            {(() => { const n = hov.floors || korpus.floors; return `${n} ${floorWord(n)}`; })()}
                            {hov.totalApts ? ` · ${hov.totalApts} ${aptWord(hov.totalApts)}` : ''}
                          </div>
                        </>
                      ) : (
                        <>
                          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 22, color: 'var(--c-charcoal)', marginBottom: 10, lineHeight: 1.2 }}>Выберите подъезд</div>
                          <div style={{ fontSize: 13, color: 'var(--c-gray-500)', lineHeight: 1.5 }}>
                            Наведите курсор на подъезд на фотографии и нажмите для выбора этажа.
                          </div>
                          <div style={{ marginTop: 16, fontSize: 12, color: 'var(--c-gray-500)' }}>Подъездов: <b style={{ color: 'var(--c-charcoal)' }}>{ents.length}</b></div>
                        </>
                      )}
                    </div>
                  );
                })()}

                {/* STEP 1: Floating info card — top-right corner, fades in after camera arrives */}
                {step === 1 && korpus && (
                  <div style={{
                    position: 'absolute', top: 24, right: 24, width: 300,
                    background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(16px)',
                    borderRadius: 14, padding: '20px 22px',
                    border: '1px solid rgba(0,0,0,0.06)',
                    boxShadow: '0 12px 36px rgba(0,0,0,0.18)',
                    animation: 'fadeUp 600ms cubic-bezier(0.4,0,0.2,1) 700ms backwards',
                    zIndex: 5,
                  }}>
                    <div style={{ fontSize: 11, letterSpacing: '0.32em', textTransform: 'uppercase', color: 'var(--c-olive)', fontWeight: 600, marginBottom: 6 }}>
                      {korpus.name}{entrance ? ` · ${entrance.name}` : ''}
                    </div>
                    {hoveredFloor ? (
                      <>
                        <div style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 400, fontSize: 22, color: 'var(--c-gold)', lineHeight: 1, marginBottom: 4 }}>— этаж —</div>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 96, color: 'var(--c-charcoal)', lineHeight: 1, letterSpacing: '-0.02em' }}>{hoveredFloor}</div>
                        <div style={{ width: 36, height: 1, background: 'var(--c-gold)', opacity: 0.7, marginTop: 14 }} />
                      </>
                    ) : (
                      <>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 22, color: 'var(--c-charcoal)', textTransform: 'uppercase', marginBottom: 10, lineHeight: 1.2 }}>Выберите этаж</div>
                        <div style={{ fontSize: 13, color: 'var(--c-gray-500)', lineHeight: 1.5, marginBottom: 18 }}>
                          Наведите на этаж на фотографии
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                          <div style={{ padding: '12px 14px', background: '#faf9f7', borderRadius: 8, border: '1px solid #ece9e5' }}>
                            <div style={{ fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--c-gray-500)', marginBottom: 4 }}>Этажей</div>
                            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 26, color: 'var(--c-charcoal)', lineHeight: 1 }}>{korpus.floors}</div>
                          </div>
                          <div style={{ padding: '12px 14px', background: '#faf9f7', borderRadius: 8, border: '1px solid #ece9e5' }}>
                            <div style={{ fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--c-gray-500)', marginBottom: 4 }}>Квартир</div>
                            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 26, color: 'var(--c-charcoal)', lineHeight: 1 }}>{korpus.total}</div>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                )}

              </div>

              {/* Stylish step hint */}
              {(() => {
                const hasEnt = Array.isArray(korpus?.entrances) && korpus.entrances.length > 1;
                let label, hint;
                if (step === 0) {
                  label = '— I — Выберите корпус';
                  hint = 'кликните на любое здание — камера приблизит к нему';
                } else if (step === 'entrance') {
                  label = '— II — Выберите подъезд';
                  hint = 'наведите на нужный подъезд и нажмите для выбора этажа';
                } else {
                  label = hasEnt ? '— III — Выберите этаж' : '— II — Выберите этаж';
                  hint = 'наведите курсор на нужный этаж и нажмите для просмотра квартир';
                }
                return (
                  <div style={{ marginTop: 28, textAlign: 'center' }}>
                    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ width: 48, height: 1, background: 'linear-gradient(90deg, transparent, var(--c-gold))' }} />
                      <span style={{ fontFamily: 'var(--font-body)', fontWeight: 700, fontSize: 14, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--c-olive-deep)' }}>{label}</span>
                      <span style={{ width: 48, height: 1, background: 'linear-gradient(90deg, var(--c-gold), transparent)' }} />
                    </div>
                    <div style={{ marginTop: 8, fontSize: 13, color: 'var(--c-gray-400)', letterSpacing: '0.02em', fontStyle: 'italic' }}>{hint}</div>
                  </div>
                );
              })()}
            </div>
          );
        })()}

        {/* ─── STEP 2 — Floor plan with apartments ─── */}
        {step === 2 && korpus && floor && (
          <div style={{ animation: 'fadeUp 350ms ease-out' }}>
            {/* Back button */}
            <div style={{ marginBottom: 16 }}>
              <button onClick={() => goBackTo(1)} style={{
                padding: '10px 18px 10px 14px', borderRadius: 99,
                background: '#fff', border: '1.5px solid #ece9e5',
                fontSize: 13, fontWeight: 600, color: 'var(--c-charcoal)',
                cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 8,
                fontFamily: 'var(--font-body)',
                transition: 'all 200ms cubic-bezier(0.4,0,0.2,1)',
                boxShadow: '0 2px 8px rgba(0,0,0,0.04)',
              }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'translateX(-2px)'; e.currentTarget.style.borderColor = 'var(--c-brand)'; e.currentTarget.style.color = 'var(--c-brand)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform = 'translateX(0)'; e.currentTarget.style.borderColor = '#ece9e5'; e.currentTarget.style.color = 'var(--c-charcoal)'; }}
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                К выбору этажа
              </button>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 24, alignItems: 'start' }}>
              {/* Floor map area */}
              <div style={{
                background: '#fff', borderRadius: 16, padding: 24,
                boxShadow: '0 4px 24px rgba(0,0,0,0.08)', border: '1px solid #ece9e5',
              }}>
                <div style={{
                  background: 'var(--c-cream)', borderRadius: 10, padding: '16px 22px', marginBottom: 18,
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10,
                  borderLeft: '3px solid var(--c-gold)',
                }}>
                  <div>
                    <div style={{ fontSize: 11, letterSpacing: '0.32em', textTransform: 'uppercase', color: 'var(--c-olive)', fontWeight: 600, marginBottom: 4 }}>
                      {korpus.name}{entrance ? ` · ${entrance.name}` : ''}
                    </div>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 26, color: 'var(--c-charcoal)', letterSpacing: '-0.01em', lineHeight: 1 }}>
                      <em style={{ fontStyle: 'italic', color: 'var(--c-olive-deep)' }}>{floor}</em> этаж
                    </div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 18, color: 'var(--c-gold)', lineHeight: 1.35 }}>
                      — {stats.total} {stats.total === 1 ? 'квартира' : (stats.total < 5 ? 'квартиры' : 'квартир')} на этаже —
                    </div>
                  </div>
                </div>
                {hasSchema
                  ? <FloorSchema schemaUrl={korpus.floorSchemas[floor]} apartments={filtered} hoveredId={hoveredId} selectedApt={selectedApt} onSelect={setSelectedApt} onHover={setHoveredId} />
                  : <FloorMap  apartments={filtered} hoveredId={hoveredId} selectedApt={selectedApt} onSelect={setSelectedApt} onHover={setHoveredId} />

                {/* Legend — premium serif */}

/* Yandex Maps JS-API map — branded main mark (pulsing) + coloured place pins */
function YandexMap({ centerLat, centerLon, zoom, places, catColors, address }) {
  const ref = useRef(null);
  const mapRef = useRef(null);

  useEffect(() => {
    let cancelled = false;

    const waitForYmaps = () => new Promise((resolve, reject) => {
      const tStart = Date.now();
      const tick = () => {
        if (typeof window === 'undefined') return reject(new Error('no window'));
        if (window.ymaps && window.ymaps.ready) return window.ymaps.ready(resolve);
        if (Date.now() - tStart > 8000) return reject(new Error('ymaps load timeout'));
        setTimeout(tick, 80);
      };
      tick();
    });

    waitForYmaps().then(() => {
      if (cancelled || !ref.current) return;
      // Destroy previous instance if we re-render
      if (mapRef.current) { try { mapRef.current.destroy(); } catch {} mapRef.current = null; }

      const map = new window.ymaps.Map(ref.current, {
        center: [Number(centerLat) || 55.4408, Number(centerLon) || 65.3654],
        zoom: Number(zoom) || 17,
        controls: ['zoomControl', 'fullscreenControl'],
      }, {
        suppressMapOpenBlock: true,
      });
      mapRef.current = map;

      // Pulsing layout for the main mark — HTML template, CSS keyframes do the animation
      const PulseLayout = window.ymaps.templateLayoutFactory.createClass(`
        <div class="polyanka-pulse">
          <div class="polyanka-pulse-ring"></div>
          <div class="polyanka-pulse-ring polyanka-pulse-ring-2"></div>
          <img class="polyanka-pulse-icon" src="assets/mark-olive.svg" />
        </div>
      `);

      // Main mark — brand logo with pulse
      const mainMark = new window.ymaps.Placemark(
        [Number(centerLat) || 55.4408, Number(centerLon) || 65.3654],
        { hintContent: 'ЖК «Полянка»', balloonContent: address || 'ЖК «Полянка»' },
        {
          iconLayout: PulseLayout,
          iconShape: { type: 'Circle', coordinates: [0, 0], radius: 28 },
        }
      );
      map.geoObjects.add(mainMark);

      // Place marks — same circle marker as in the list (color disc + white ring + soft halo)
      const makePinIcon = (color) => {
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
            // soft halo
            `<circle cx="16" cy="16" r="15" fill="${color}" fill-opacity="0.18"/>` +
            // white ring
            `<circle cx="16" cy="16" r="11" fill="#ffffff"/>` +
            // colored disc
            `<circle cx="16" cy="16" r="7" fill="${color}"/>` +
          '</svg>';
        return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      };

      (places || []).forEach(pl => {
        const lat = Number(pl.lat), lon = Number(pl.lon);
        if (!isFinite(lat) || !isFinite(lon) || lat === 0 || lon === 0) return;
        const color = (catColors && catColors[pl.cat]) || '#A85D3F';
        const pin = new window.ymaps.Placemark(
          [lat, lon],
          {
            hintContent: pl.name,
            balloonContent: `<b>${pl.name}</b><br/><span style="color:#6B7350;font-style:italic">${pl.cat}${pl.dist ? ' · ' + pl.dist : ''}</span>`,
          },
          {
            iconLayout: 'default#image',
            iconImageHref: makePinIcon(color),
            iconImageSize: [32, 32],
            iconImageOffset: [-16, -16],
          }
        );
        map.geoObjects.add(pin);
      });
    }).catch(() => {
      // ymaps didn't load — show a fallback message
      if (ref.current) ref.current.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#7D8068;font-family:var(--font-display);font-style:italic;font-size:16px">— карта недоступна, проверьте подключение —</div>';
    });

    return () => {
      cancelled = true;
      if (mapRef.current) { try { mapRef.current.destroy(); } catch {} mapRef.current = null; }
    };
  }, [centerLat, centerLon, zoom, JSON.stringify(places), JSON.stringify(catColors)]);

  return <div ref={ref} style={{ width: '100%', height: '100%', background: 'var(--c-cream)' }} />;
}

function ContactForm() {
  const [form, setForm] = useState({ name: '', phone: '+7 ', rooms: '', comment: '' });
  const [agreePolicy, setAgreePolicy] = useState(false);
  const [agreeMarketing, setAgreeMarketing] = useState(false);
  const [roomsOpen, setRoomsOpen] = useState(false);
  const [sent, setSent] = useState(false);
  const roomsRef = useRef(null);

  useEffect(() => {
    if (!roomsOpen) return;
    const onDocClick = e => { if (roomsRef.current && !roomsRef.current.contains(e.target)) setRoomsOpen(false); };
    const onEsc = e => { if (e.key === 'Escape') setRoomsOpen(false); };
    document.addEventListener('mousedown', onDocClick);
    document.addEventListener('keydown', onEsc);
    return () => { document.removeEventListener('mousedown', onDocClick); document.removeEventListener('keydown', onEsc); };
  }, [roomsOpen]);

  /* Document URLs (admin uploads them in /admin → Документы) */
  const docs = Array.isArray(DOCS) ? DOCS : DEFAULT_DOCS;
  const docHref = (id) => {
    const d = docs.find(x => x.id === id);
    return d && d.url ? d.url : '/doc';
  };

  /* Phone mask — always keep "+7 " prefix, accept only digits after */
  const formatPhone = (raw) => {
    // Strip everything except digits, drop leading 7/8 if user pasted full number
    const digits = String(raw || '').replace(/\D/g, '').replace(/^[78]/, '').slice(0, 10);
    if (digits.length === 0) return '+7 ';
    let out = '+7 (' + digits.slice(0, 3);
    if (digits.length >= 4) out += ') ' + digits.slice(3, 6);
    if (digits.length >= 7) out += '-' + digits.slice(6, 8);
    if (digits.length >= 9) out += '-' + digits.slice(8, 10);
    return out;
  };

/* Thumbnail that mirrors the Интерактивный выбор highlight 1:1.
   Renders SITE_RENDER as a native <img> (full aspect ratio preserved)
   with a stretched SVG overlay on top using preserveAspectRatio="none",
   so polygon coordinates map exactly the same way they do on the
   interactive map. The image is already cached from FloorPlan, so no
   extra network request. */
function SiteRenderThumb({ polygon, label, sublabel }) {
  const maskId = `thumb-mask-${(label || '').replace(/[^a-zA-Z0-9]/g, '-')}`;
  return (
    <div style={{
      position: 'relative', overflow: 'hidden', borderRadius: 10,
      background: 'var(--c-cream)', border: '1px solid var(--c-gold)',
      boxShadow: '0 2px 10px rgba(0,0,0,0.05)',
      lineHeight: 0,
    }}>
      <img
        src={SITE_RENDER}
        alt=""
        style={{ width: '100%', height: 'auto', display: 'block' }}
        draggable={false}
      />
      <svg viewBox="0 0 100 56.25" preserveAspectRatio="none"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
        {polygon && (
          <defs>
            <mask id={maskId}>
              <rect x="0" y="0" width="100" height="56.25" fill="white" />
              <polygon points={polygon} fill="black" />
            </mask>
          </defs>
        )}
        {polygon && (
          <rect x="0" y="0" width="100" height="56.25" fill="rgba(20,17,14,0.55)" mask={`url(#${maskId})`} />
        )}
        {polygon && (
          <polygon points={polygon}
            fill="rgba(255,240,220,0.20)"
            stroke="#B89968" strokeWidth="0.35"
            style={{ filter: 'drop-shadow(0 0 1.2px rgba(255,210,160,0.9)) drop-shadow(0 0 2.5px rgba(255,180,120,0.5))' }}
          />
        )}
      </svg>

      {/* Bottom gradient strip with label */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        background: 'linear-gradient(to top, rgba(20,17,14,0.88) 0%, rgba(20,17,14,0.0) 100%)',
        padding: '22px 16px 12px',
        lineHeight: 1.3,
      }}>
        <div style={{
          fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 600,
          fontSize: 13, color: 'var(--c-champagne)', letterSpacing: '0.04em',
        }}>{sublabel}</div>
        <div style={{
          fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 18,
          color: '#fff', lineHeight: 1.1, letterSpacing: '-0.005em',
        }}>{label}</div>
      </div>
    </div>
  );
}

/* ─── SCROLL REVEAL ─── */
function useReveal() {
  useEffect(() => {
    const observe = () => {
      const els = document.querySelectorAll('.reveal');
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      els.forEach(el => io.observe(el));
      return () => io.disconnect();
    };
    const cleanup = observe();
    return cleanup;
  }, []);
}
