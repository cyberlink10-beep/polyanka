  <script>
    /* Bootstrap from server: synchronously fetch latest data into localStorage
       before React reads it. Edge runtime keeps this fast (~50–150ms). */
    (function () {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/data', false);
        xhr.timeout = 4000;
        xhr.send();
        if (xhr.status === 200) {
          var data = JSON.parse(xhr.responseText || '{}');
          Object.keys(data).forEach(function (k) {
            try { localStorage.setItem(k, JSON.stringify(data[k])); } catch (e) {}
          });
        }
      } catch (e) { /* offline / first run / cold start — fall back to localStorage */ }
    })();

const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ─── BOOTSTRAP FROM SERVER (async, gates React render) ───
   Deep-merges server payload into localStorage. NEVER wipes local-only
   sub-keys that the server doesn't have yet (e.g. unsynced floor polygons). */
function __deepMerge(local, server) {
  if (server == null) return local;
  if (local == null) return server;
  if (Array.isArray(local) && Array.isArray(server)) {
    const byId = new Map();
    for (const x of local) if (x && x.id != null) byId.set(x.id, x);
    for (const x of server) {
      if (x && x.id != null) {
        const ex = byId.get(x.id);
        byId.set(x.id, ex ? __deepMerge(ex, x) : x);
      }
    }
    if (byId.size > 0) return Array.from(byId.values()).sort((a,b)=>(a.id||0)-(b.id||0));
    return server;
  }
  if (typeof local === 'object' && typeof server === 'object' && !Array.isArray(local) && !Array.isArray(server)) {
    const out = { ...local };
    for (const k of Object.keys(server)) out[k] = __deepMerge(out[k], server[k]);
    return out;
  }
  return server;
}
async function __bootstrapFromServer() {
  let data = null;
  try {
    const r = await fetch('/api/data', { cache: 'no-store' });
    if (!r.ok) return;
    data = await r.json();
  } catch (e) { return; }
  if (!data || typeof data !== 'object') return;
  Object.keys(data).forEach(k => {
    try {
      const existing = localStorage.getItem(k);
      let merged = data[k];
      if (existing) {
        try {
          const local = JSON.parse(existing);
          merged = __deepMerge(local, data[k]);
        } catch {}
      }
      localStorage.setItem(k, JSON.stringify(merged));
    } catch (e) {}
  });
}

(async () => {
await __bootstrapFromServer();

/* ─── RIPPLE HELPER ─── */
function addRipple(e) {
  const btn = e.currentTarget;
  const r = btn.getBoundingClientRect();
  const size = Math.max(r.width, r.height) * 2;
  const x = e.clientX - r.left - size / 2;
  const y = e.clientY - r.top - size / 2;
  const span = document.createElement('span');
  span.className = 'ripple';
  span.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(span);
  span.addEventListener('animationend', () => span.remove());
}

function Hero({ onNav }) {
  const [current, setCurrent] = useState(0);
  const [prev, setPrev] = useState(null);
  const [fading, setFading] = useState(false);
  const timerRef = useRef(null);

  const goTo = useCallback((next) => {
    if (fading) return;
    setPrev(current);
    setFading(true);
    setTimeout(() => {
      setCurrent(next);
      setPrev(null);
      setFading(false);
    }, 700);
  }, [current, fading]);

  const goPrev = useCallback(() => {
    goTo((current - 1 + SLIDES.length) % SLIDES.length);
  }, [current, goTo]);

  const goNext = useCallback(() => {
    goTo((current + 1) % SLIDES.length);
  }, [current, goTo]);

  // Auto-advance
  useEffect(() => {
    timerRef.current = setInterval(goNext, 7000);
    return () => clearInterval(timerRef.current);
  }, [goNext]);

  const resetTimer = () => {
    clearInterval(timerRef.current);
    timerRef.current = setInterval(goNext, 7000);
  };

  const handlePrev = () => { goPrev(); resetTimer(); };
  const handleNext = () => { goNext(); resetTimer(); };

      <div className="container" style={{ position: 'relative', zIndex: 5, paddingBottom: 80, width: '100%' }}>
        <div style={{ maxWidth: 680 }}>

          <div className="hero-line hero-line-1" style={{ marginBottom: 22, display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{

              <svg width="12" height="15" viewBox="0 0 12 15" fill="none">

const HOME_INITIAL = 8, HOME_EXPANDED = 12;
const FULL_INITIAL = 16, FULL_STEP = 16;

function ApartmentCatalog({ onSelectApt, fullPage = false, onShowAll, onBackHome }) {
  const [roomsFilter, setRoomsFilter] = useState(null);
  const [sortBy, setSortBy] = useState('price-asc');
  // Snap min/max to step grid so the slider can always reach actual extremes
  const PRICE_STEP = 50000;
  const minBound = Math.floor(Math.min(...APARTMENTS.map(a => a.price)) / PRICE_STEP) * PRICE_STEP;
  const maxBound = Math.ceil (Math.max(...APARTMENTS.map(a => a.price)) / PRICE_STEP) * PRICE_STEP;
  const minArea = Math.floor(Math.min(...APARTMENTS.map(a => a.area)));
  const maxArea = Math.ceil(Math.max(...APARTMENTS.map(a => a.area)));
  const [priceRange, setPriceRange] = useState([minBound, maxBound]);
  const [areaRange, setAreaRange] = useState([minArea, maxArea]);
  const [revealed, setRevealed] = useState(fullPage ? FULL_INITIAL : HOME_INITIAL);
  const [shuffleTick, setShuffleTick] = useState(0);

  // Reset visible count and reshuffle when filters change
  useEffect(() => {
    setRevealed(fullPage ? FULL_INITIAL : HOME_INITIAL);
    setShuffleTick(t => t + 1);
  }, [roomsFilter, priceRange[0], priceRange[1], areaRange[0], areaRange[1], fullPage]);

  const filtered = APARTMENTS
    .filter(a => {
      if (roomsFilter && a.rooms !== roomsFilter) return false;
      if (a.price < priceRange[0]) return false;
      if (a.price > priceRange[1]) return false;
      if (a.area < areaRange[0]) return false;
      if (a.area > areaRange[1]) return false;
      return true;
    })
    .sort((a, b) => {
      if (sortBy === 'price-asc') return a.price - b.price;
      if (sortBy === 'price-desc') return b.price - a.price;
      if (sortBy === 'area-asc') return a.area - b.area;
      if (sortBy === 'area-desc') return b.area - a.area;
      return 0;
    });

  // Initial mix: 3×1k + 3×2k + 2×3k randomly ordered (only on home + no rooms filter)
  const ordered = useMemo(() => {
    if (fullPage || roomsFilter) return filtered;
    const shuffle = arr => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };
    const r1 = shuffle(filtered.filter(x => x.rooms === 1)).slice(0, 3);
    const r2 = shuffle(filtered.filter(x => x.rooms === 2)).slice(0, 3);
    const r3 = shuffle(filtered.filter(x => x.rooms === 3)).slice(0, 2);
    const mix = shuffle([...r1, ...r2, ...r3]);
    const mixIds = new Set(mix.map(a => a.id));
    const rest = filtered.filter(a => !mixIds.has(a.id));
    return [...mix, ...rest];
  }, [shuffleTick, fullPage, roomsFilter, sortBy]);

  const visible = ordered.slice(0, revealed);
  const total = ordered.length;
  const canShowMore = revealed < total;

  const fmtPrice = v => `${(v / 1000000).toFixed(2).replace(/\.?0+$/, '')} млн ₽`;
  const fillL = (priceRange[0] - minBound) / (maxBound - minBound) * 100;
  const fillR = (priceRange[1] - minBound) / (maxBound - minBound) * 100;
  const aFillL = (areaRange[0] - minArea) / (maxArea - minArea) * 100;
  const aFillR = (areaRange[1] - minArea) / (maxArea - minArea) * 100;

  return (
    <section id="catalog" style={{ padding: '96px 0', background: 'var(--c-surface)' }}>
      <div className="container">
        <div style={{ marginBottom: 48 }}>
          <div style={{ fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--c-brand)', marginBottom: 12 }}>
            Каталог квартир
          </div>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(32px, 4vw, 48px)', textTransform: 'uppercase', color: 'var(--c-charcoal)', lineHeight: 1.05 }}>
            Выберите квартиру
          </h2>
        </div>

        {/* Filter bar */}
        <div style={{
          background: '#fff', borderRadius: 20, marginBottom: 36,
          boxShadow: '0 4px 40px rgba(0,0,0,0.09)',
          overflow: 'hidden',
          border: '1px solid rgba(0,0,0,0.05)',
        }}>
          {/* Top accent line */}
          <div style={{ height: 3, background: 'linear-gradient(90deg, #E05520 0%, #D94E1F 50%, rgba(217,78,31,0.2) 100%)' }} />

          <div style={{ padding: '22px 28px', display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 28, alignItems: 'center' }}>

            {/* Rooms — separated pills with wow hover */}
            <div style={{ display: 'flex', gap: 8 }}>
              {[
                { v: null, l: 'Все' },
                { v: 1, l: '1к' },
                { v: 2, l: '2к' },
                { v: 3, l: '3к' },
              ].map(r => {
                const active = roomsFilter === r.v;

/* ─── FLOOR PLAN ─── */
function genFloor(floor, korpus) {
  const seed = floor * 7 + korpus * 13;
  const layouts = [
    { rooms: 1, area: 36, side: 'left' },
    { rooms: 1, area: 42, side: 'left' },
    { rooms: 2, area: 58, side: 'center' },
    { rooms: 2, area: 64, side: 'center' },
    { rooms: 3, area: 78, side: 'right' },
    { rooms: 3, area: 86, side: 'right' },
    { rooms: 1, area: 34, side: 'right' },
  ];
  return layouts.map((l, i) => ({
    ...l,
    id: `${korpus}-${floor}-${i}`,
    floor,
    korpus,
    available: (seed + i * 3) % 5 !== 0,
    price: Math.round((l.area * 78000 + floor * 12000) / 10000) * 10000,
    apt: `${(floor - 1) * 7 + i + 1}`,
  }));
}

function AptShape({ apt, isHovered, isSelected, onClick, onHover }) {
  const W = apt.rooms === 1 ? 70 : apt.rooms === 2 ? 100 : 130;
  const H = apt.area < 50 ? 80 : apt.area < 70 ? 96 : 110;
  const fill = isSelected ? '#D94E1F' : isHovered ? '#F0784A' : apt.available ? '#fff' : '#EDE8E3';
  const stroke = isSelected ? '#D94E1F' : '#C0B8B0';
  const textCol = isSelected ? '#fff' : apt.available ? '#2D2A27' : '#C0B8B0';

  return (
    <g
      style={{ cursor: apt.available ? 'pointer' : 'default' }}
      onClick={() => apt.available && onClick(apt)}
      onMouseEnter={() => apt.available && onHover(apt.id)}
      onMouseLeave={() => onHover(null)}
    >
      <rect x="0" y="0" width={W} height={H} rx="6" fill={fill} stroke={stroke} strokeWidth="1.5" style={{ transition: 'fill 150ms' }} />
      <text x={W/2} y={H/2 - 8} textAnchor="middle" fontFamily="'Dela Gothic One', sans-serif" fontSize="14" fill={textCol}>{apt.rooms}-к</text>
      <text x={W/2} y={H/2 + 8} textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="10" fill={isSelected ? 'rgba(255,255,255,0.8)' : '#7A746E'}>{apt.area} м²</text>
      <text x={W/2} y={H/2 + 22} textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="9" fill={isSelected ? 'rgba(255,255,255,0.7)' : '#C0B8B0'}>кв. {apt.apt}</text>
      {!apt.available && (
        <text x={W/2} y={H - 12} textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="9" fill="#C0B8B0">бронь</text>
      )}
    </g>
  );
}

/* ─── FLOOR SCHEMA — image with apartment polygons ─── */
function FloorSchema({ schemaUrl, apartments, hoveredId, selectedApt, onSelect, onHover }) {
  // Apartments without polygon are listed as a fallback panel below the schema
  const withPolygon = apartments.filter(a => a.polygon && typeof a.polygon === 'string' && a.polygon.trim());
  const noPolygon = apartments.filter(a => !a.polygon);

  return (
    <div>
      <div style={{
        position: 'relative', borderRadius: 14, overflow: 'hidden',
        background: '#fafaf8', border: '1px solid #ece9e5',
      }}>
        <img src={schemaUrl} alt="Планировка этажа" style={{ width:'100%', display:'block' }} draggable={false} />
        <svg viewBox="0 0 100 56.25" preserveAspectRatio="none"
          style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
          {withPolygon.map(apt => {
            const isHover = hoveredId === apt.id;
            const isSel = selectedApt?.id === apt.id;
            const sold = !apt.available;
            const fill = sold
              ? 'rgba(120,120,120,0.32)'
              : isSel
                ? 'rgba(217,78,31,0.55)'
                : isHover
                  ? 'rgba(255,200,150,0.42)'
                  : 'rgba(255,255,255,0.001)';
            const stroke = sold
              ? 'rgba(120,120,120,0.55)'
              : isSel
                ? '#E05520'
                : isHover
                  ? 'rgba(217,78,31,0.6)'
                  : 'transparent';
            return (
              <polygon key={apt.id}
                points={apt.polygon}
                fill={fill}
                stroke={stroke}
                strokeWidth={isHover || isSel ? 0.35 : 0}
                vectorEffect="non-scaling-stroke"
                style={{
                  cursor: sold ? 'not-allowed' : 'pointer',
                  transition: 'fill 220ms cubic-bezier(.4,0,.2,1), stroke 220ms',
                  filter: isHover && !sold ? 'drop-shadow(0 0 1.4px rgba(217,78,31,0.6))' : 'none',
                  pointerEvents: sold ? 'none' : 'auto',
                }}
                onMouseEnter={() => !sold && onHover(apt.id)}
                onMouseLeave={() => onHover(null)}
                onClick={() => !sold && onSelect(apt)}
              />
            );
          })}
        </svg>

        {/* Sold overlay tooltip on hover (skipped for cleanliness) */}
        {hoveredId && (() => {
          const apt = apartments.find(a => a.id === hoveredId);
          if (!apt || !apt.polygon) return null;
          const pts = apt.polygon.split(/\s+/).map(p => p.split(',').map(Number));
          const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length;
          const cy = pts.reduce((s,p)=>s+p[1],0)/pts.length;
          return (
            <div style={{
              position:'absolute', top:`${(cy/56.25)*100}%`, left:`${cx}%`,
              transform:'translate(-50%, -120%)', pointerEvents:'none',
              background:'rgba(20,17,14,0.96)', backdropFilter:'blur(12px)',
              border:'1px solid rgba(217,78,31,0.4)', borderRadius:10,
              padding:'10px 14px', boxShadow:'0 14px 30px rgba(0,0,0,0.35)',
              animation:'fadeUp 160ms ease-out', minWidth:140, textAlign:'center',
            }}>
              <div style={{ fontFamily:'var(--font-display)', fontSize:16, color:'#fff', textTransform:'uppercase' }}>{apt.rooms}-комн · {apt.area} м²</div>
              <div style={{ fontSize:12, color:'var(--c-brand)', fontWeight:700, marginTop:3 }}>{apt.price.toLocaleString('ru-RU')} ₽</div>
            </div>
          );
        })()}
      </div>

      {/* Apartments without polygons — fallback list */}
      {noPolygon.length > 0 && (
        <div style={{ marginTop:12, padding:'12px 14px', background:'#fff7ee', border:'1px solid rgba(217,78,31,0.18)', borderRadius:10, fontSize:12, color:'var(--c-gray-500)' }}>
          {noPolygon.length} квартир(а) на этом этаже без обведённого контура — обведите их в админке (Корпуса → Квартиры на этаже)
        </div>
      )}
    </div>
  );
}

/* Building elevation step — stylized SVG with hoverable floors */
function FloorElevation({ korpus, hovered, onHover, onSelect }) {
  const F = korpus.floors;
  const W = 280, H = 480, top = 24;
  const fh = (H - top) / F;
  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${W + 60} ${H + 30}`} preserveAspectRatio="xMidYMid meet" style={{ maxHeight: 540 }}>
      <defs>
        <linearGradient id="bldgGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#1f1a14" />
          <stop offset="100%" stopColor="#15110d" />
        </linearGradient>
        <linearGradient id="winLit" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#ffd28a" />
          <stop offset="100%" stopColor="#E3854D" />
        </linearGradient>
      </defs>
      {/* Base/ground line */}
      <line x1="20" y1={top + H} x2={W + 50} y2={top + H} stroke="rgba(255,255,255,0.1)" strokeWidth="1" />
      {/* Roof */}
      <rect x="36" y={top - 8} width={W - 12} height="8" rx="2" fill="#0c0a08" stroke="rgba(255,255,255,0.08)" strokeWidth="0.8" />
      {/* Building body */}
      <rect x="40" y={top} width={W - 20} height={H} fill="url(#bldgGrad)" stroke="rgba(255,255,255,0.08)" strokeWidth="0.8" />

      {/* Floors */}
      {Array.from({ length: F }, (_, i) => {
        const floorNum = F - i;
        const y = top + i * fh;
        const isHover = hovered === floorNum;
        return (
          <g key={floorNum}>
            <rect
              x="40" y={y} width={W - 20} height={fh - 0.5}
              fill={isHover ? 'rgba(217,78,31,0.32)' : 'rgba(255,255,255,0)'}
              stroke={isHover ? '#E05520' : 'rgba(255,255,255,0.04)'}
              strokeWidth={isHover ? 1.5 : 0.5}
              style={{ cursor: 'pointer', transition: 'all 220ms' }}
              onMouseEnter={() => onHover(floorNum)}
              onMouseLeave={() => onHover(null)}
              onClick={() => onSelect(floorNum)}
            />
            {/* Windows row */}
            {Array.from({ length: 6 }, (_, j) => (
              <rect key={j}
                x={56 + j * ((W - 50) / 6)} y={y + fh * 0.2}
                width={(W - 50) / 6 - 6} height={fh * 0.55}
                rx="1"
                fill={isHover ? 'url(#winLit)' : 'rgba(255,255,255,0.18)'}
                style={{ pointerEvents: 'none', transition: 'fill 220ms' }}
              />
            ))}
            {/* Floor number */}
            <text x="22" y={y + fh / 2 + 4} fontSize="11" fontWeight="600"
              fill={isHover ? '#E05520' : 'rgba(255,255,255,0.5)'}
              fontFamily="var(--font-body)" style={{ transition: 'fill 220ms' }}>{floorNum}</text>
            {/* Floor separator */}
            <line x1="40" y1={y + fh} x2={W + 20} y2={y + fh} stroke="rgba(255,255,255,0.06)" strokeWidth="0.4" />
          </g>
        );
      })}
    </svg>
  );
}

function FloorPlan({ onSelectApt }) {
  const [step, setStep] = useState(0);          // 0=korpus, 1=floor, 2=plan
  const [korpus, setKorpus] = useState(null);
  const [floor, setFloor] = useState(null);
  const [hoveredKorpus, setHoveredKorpus] = useState(null);
  const [hoveredFloor, setHoveredFloor] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [selectedApt, setSelectedApt] = useState(null);
  const [filterRooms, setFilterRooms] = useState(null);
  const [filterAvail, setFilterAvail] = useState('all');
  const FLOORS = 12;

  const KORPUSES = KORPUSES_DATA;

  const goKorpus = k => { setKorpus(k); setFloor(null); setSelectedApt(null); setStep(1); };
  const goFloor  = f => { setFloor(f); setSelectedApt(null); setStep(2); };
  const goBackTo = (s) => {
    if (s <= 0) { setStep(0); setKorpus(null); setFloor(null); setSelectedApt(null); }
    else if (s === 1 && korpus) { setStep(1); setFloor(null); setSelectedApt(null); }
  };

  // Step 2 data
  // Use real apartments if floor schema exists, otherwise fall back to procedural FloorMap
  const hasSchema = korpus && floor && korpus.floorSchemas && korpus.floorSchemas[floor];
  const realApts = (floor && korpus)
    ? APARTMENTS.filter(a => a.korpus === korpus.id && Number(a.floor) === Number(floor))
    : [];
  const allApts = floor && korpus
    ? (hasSchema ? realApts : genFloor(floor, korpus.id))
    : [];
  const filtered = allApts.filter(a => {
    if (filterRooms && a.rooms !== filterRooms) return false;
    if (filterAvail === 'free' && !a.available) return false;
    if (filterAvail === 'booked' && a.available) return false;
    return true;
  });
  const stats = allApts.reduce((acc, a) => { acc.total++; if (a.available) acc.free++; else acc.booked++; return acc; }, { total: 0, free: 0, booked: 0 });

  const Crumb = ({ n, label, value, isActive, isDone, clickable, onClick }) => (
    <div onClick={clickable ? onClick : undefined} style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '12px 18px',
      borderRadius: 12, cursor: clickable ? 'pointer' : 'default',
      background: isActive ? 'rgba(217,78,31,0.06)' : isDone ? '#faf9f7' : '#fff',
      border: '1px solid', borderColor: isActive ? 'rgba(217,78,31,0.4)' : isDone ? '#ece9e5' : '#f0eeea',
      transition: 'all 200ms', flex: 1, minWidth: 160,
    }}>
      <div style={{
        width: 30, height: 30, borderRadius: '50%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 700,
        background: isActive ? 'linear-gradient(135deg,#E05520,#C43818)' : isDone ? 'rgba(217,78,31,0.14)' : '#f0eeea',
        color: isActive ? '#fff' : isDone ? '#E3854D' : '#bbb',
        boxShadow: isActive ? '0 4px 14px rgba(217,78,31,0.32)' : 'none',
        flexShrink: 0,
      }}>{isDone ? '✓' : n}</div>
      <div style={{ overflow: 'hidden' }}>
        <div style={{ fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--c-gray-400)' }}>{label}</div>
        <div style={{ fontSize: 13, fontWeight: 600, marginTop: 2, color: isActive || isDone ? 'var(--c-charcoal)' : '#bbb', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {value || '—'}
        </div>
      </div>
    </div>
  );

  return (
    <section id="floorplan" style={{ padding: '96px 0', background: '#fff', position: 'relative' }}>
      <div className="container" style={{ position: 'relative' }}>
        <div style={{ marginBottom: 36 }}>
          <div style={{ fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--c-brand)', marginBottom: 12 }}>
            Интерактивный выбор
          </div>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(32px,4vw,48px)', textTransform: 'uppercase', color: 'var(--c-charcoal)', lineHeight: 1.05 }}>
            Планировки по этажам
          </h2>
        </div>

        {/* Breadcrumbs */}
        <div style={{ display: 'flex', alignItems: 'stretch', gap: 8, marginBottom: 28, flexWrap: 'wrap' }}>
          <Crumb n={1} label="Шаг 1 · Корпус"  value={korpus?.name}                     isActive={step === 0} isDone={step > 0}                          clickable={step > 0}              onClick={() => goBackTo(0)} />
          <Crumb n={2} label="Шаг 2 · Этаж"    value={floor ? `${floor} этаж` : null}    isActive={step === 1} isDone={step > 1}                          clickable={step > 1 && !!korpus}  onClick={() => goBackTo(1)} />
          <Crumb n={3} label="Шаг 3 · Квартира" value={selectedApt ? `Кв. ${selectedApt.apt}` : null} isActive={step === 2} isDone={false}            clickable={false} />
        </div>

        {/* ─── STEPS 0 & 1 — Cinematic photo with camera fly-in ─── */}
        {(step === 0 || step === 1) && (() => {
          // Camera transform: zoom into selected korpus polygon, centered in viewport
          const cameraStyle = (k) => {
            if (!k) return { transform: 'scale(1) translate(0%, 0%)', transformOrigin: '50% 50%' };
            const pts = (k.polygon || '').split(/\s+/).map(p => p.split(',').map(Number)).filter(p => p.length === 2 && !isNaN(p[0]));
            if (pts.length < 2) return { transform: 'scale(1) translate(0%, 0%)', transformOrigin: '50% 50%' };
            const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
            const bw = Math.max(maxX - minX, 1), bh = Math.max(maxY - minY, 1);
            const scaleX = 100 / (bw * 1.13 + 4);
            const scaleY = 56.25 / (bh * 1.13 + 4);
            const scale = Math.max(1, Math.min(scaleX, scaleY, 3.9));
            // shift building center to viewport center (in % of image)
            const tx = 50 - cx;                       // % of image width
            const ty = 50 - (cy / 56.25) * 100;       // % of image height
            return {
              transform: `scale(${scale}) translate(${tx}%, ${ty}%)`,
              transformOrigin: '50% 50%',
            };
          };
          const camera = cameraStyle(step === 1 ? korpus : null);
          return (
            <div style={{ animation: step === 0 ? 'fadeUp 350ms ease-out' : 'none' }}>
              <div style={{
                position: 'relative', borderRadius: 18, overflow: 'hidden',
                border: '1px solid #ece9e5',
                boxShadow: '0 12px 40px rgba(0,0,0,0.12)',
                background: '#f5f3ef',
              }}>
                {/* Back button — Step 1 only */}
                {step === 1 && (
                  <button onClick={() => goBackTo(0)} style={{
                    position: 'absolute', top: 24, left: 24, zIndex: 6,
                    padding: '10px 18px 10px 14px', borderRadius: 99,
                    background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(12px)',
                    border: '1px solid rgba(0,0,0,0.06)',
                    boxShadow: '0 6px 22px rgba(0,0,0,0.14)',
                    fontSize: 13, fontWeight: 600, color: 'var(--c-charcoal)',
                    cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8,
                    fontFamily: 'var(--font-body)',
                    transition: 'all 200ms cubic-bezier(0.4,0,0.2,1)',
                    animation: 'fadeUp 500ms ease-out 800ms backwards',
                  }}
                    onMouseEnter={e => { e.currentTarget.style.transform = 'translateX(-2px)'; e.currentTarget.style.boxShadow = '0 8px 26px rgba(0,0,0,0.18)'; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = 'translateX(0)'; e.currentTarget.style.boxShadow = '0 6px 22px rgba(0,0,0,0.14)'; }}
                  >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                      <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    К выбору корпуса
                  </button>
                )}
                {/* Zoomable layer — camera transform applied here */}
                <div style={{
                  position: 'relative',
                  ...camera,
                  transition: 'transform 1200ms cubic-bezier(0.65, 0, 0.35, 1)',
                  willChange: 'transform',
                }}>
                  <img src={SITE_RENDER} alt="" style={{ width: '100%', display: 'block' }} draggable={false} />
                  <svg viewBox="0 0 100 56.25" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
                    {/* STEP 0: korpus polygons */}
                    {step === 0 && KORPUSES.map(k => {
                      const isHover = hoveredKorpus === k.id;
                      return (
                        <polygon key={k.id}
                          points={k.polygon}
                          fill={isHover ? 'rgba(217,78,31,0.30)' : 'rgba(255,255,255,0.001)'}
                          stroke={isHover ? '#E05520' : 'transparent'}
                          strokeWidth={isHover ? 0.4 : 0}
                          style={{ cursor: 'pointer', transition: 'all 220ms', filter: isHover ? 'drop-shadow(0 0 6px rgba(217,78,31,0.55))' : 'none' }}
                          onMouseEnter={() => setHoveredKorpus(k.id)}
                          onMouseLeave={() => setHoveredKorpus(null)}
                          onClick={() => goKorpus(k)}
                        />
                      );
                    })}

                    {/* STEP 1: dim mask + floor polygons */}
                    {step === 1 && korpus && (
                      <>
                        <defs>
                          <mask id="korpusMask">
                            <rect x="0" y="0" width="100" height="56.25" fill="white" />
                            <polygon points={korpus.polygon} fill="black" />
                          </mask>
                        </defs>
                        <rect x="0" y="0" width="100" height="56.25" fill="rgba(20,17,14,0.55)" mask="url(#korpusMask)" pointerEvents="none" style={{ transition: 'fill 600ms ease-out' }} />
                        {(() => {
                          const fp = korpus.floorPolygons || {};
                          const floors = Array.from({ length: korpus.floors }, (_, i) => korpus.floors - i);
                          return floors.map(f => {
                            if (!fp[f]) return null;
                            const isHover = hoveredFloor === f;
                            return (
                              <polygon key={f}
                                points={fp[f]}
                                fill={isHover ? 'rgba(255,240,220,0.38)' : 'rgba(255,255,255,0.04)'}
                                stroke="none"
                                style={{
                                  cursor: 'pointer',
                                  transition: 'fill 260ms cubic-bezier(.4,0,.2,1), filter 260ms',
                                  filter: isHover ? 'drop-shadow(0 0 1.2px rgba(255,210,160,0.9)) drop-shadow(0 0 2.5px rgba(255,180,120,0.6))' : 'none',
                                }}
                                onMouseEnter={() => setHoveredFloor(f)}
                                onMouseLeave={() => setHoveredFloor(null)}
                                onClick={() => goFloor(f)}
                              />
                            );
                          });
                        })()}
                      </>
                    )}
                  </svg>
                </div>

                {/* STEP 0: Hover tooltip — anchored to korpus */}
                {step === 0 && hoveredKorpus && (() => {
                  const k = KORPUSES.find(x => x.id === hoveredKorpus);
                  return (
                    <div style={{
                      position: 'absolute', top: `${(k.cy / 56.25) * 100}%`, left: `${k.cx}%`,
                      transform: 'translate(-50%, -120%)',
                      background: 'rgba(20,17,14,0.96)', backdropFilter: 'blur(14px)',
                      border: '1px solid rgba(217,78,31,0.45)', borderRadius: 12,
                      padding: '14px 20px', pointerEvents: 'none',
                      boxShadow: '0 16px 40px rgba(0,0,0,0.35), 0 0 22px rgba(217,78,31,0.22)',
                      animation: 'fadeUp 180ms ease-out',
                      minWidth: 180, textAlign: 'center', zIndex: 5,
                    }}>
                      <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: '#fff', textTransform: 'uppercase', marginBottom: 6 }}>{k.name}</div>
                      <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 4 }}>{k.floors} этажей · {k.total} квартир</div>
                      <div style={{ fontSize: 12, color: '#4ade80', fontWeight: 600 }}>● {k.free} свободно</div>
                    </div>
                  );
                })()}

                {/* STEP 1: Floating info card — top-right corner, fades in after camera arrives */}
                {step === 1 && korpus && (
                  <div style={{
                    position: 'absolute', top: 24, right: 24, width: 300,
                    background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(16px)',
                    borderRadius: 14, padding: '20px 22px',
                    border: '1px solid rgba(0,0,0,0.06)',
                    boxShadow: '0 12px 36px rgba(0,0,0,0.18)',
                    animation: 'fadeUp 600ms cubic-bezier(0.4,0,0.2,1) 700ms backwards',
                    zIndex: 5,
                  }}>
                    <div style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--c-brand)', fontWeight: 700, marginBottom: 6 }}>{korpus.name}</div>
                    {hoveredFloor ? (
                      <>
                        <div style={{ fontFamily: 'var(--font-display)', fontSize: 56, color: 'var(--c-charcoal)', lineHeight: 1, marginBottom: 2 }}>{hoveredFloor}</div>
                        <div style={{ fontSize: 12, color: 'var(--c-gray-500)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 18 }}>этаж</div>
                        {(() => {
                          const apts = genFloor(hoveredFloor, korpus.id);
                          const free = apts.filter(a => a.available).length;
                          const minP = Math.min(...apts.map(a => a.price));
                          return (
                            <div style={{ display: 'grid', gap: 10 }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ fontSize: 12, color: 'var(--c-gray-500)' }}>Квартир</span>
                                <span style={{ fontSize: 13, color: 'var(--c-charcoal)', fontWeight: 600 }}>{apts.length}</span>
                              </div>
                              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ fontSize: 12, color: 'var(--c-gray-500)' }}>Свободных</span>
                                <span style={{ fontSize: 13, color: '#16a34a', fontWeight: 600 }}>{free}</span>
                              </div>
                              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ fontSize: 12, color: 'var(--c-gray-500)' }}>От</span>
                                <span style={{ fontSize: 14, color: 'var(--c-brand)', fontWeight: 700 }}>{(minP / 1000000).toFixed(2).replace(/\.?0+$/, '')} млн ₽</span>
                              </div>
                            </div>
                          );
                        })()}
                      </>
                    ) : (
                      <>
                        <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--c-charcoal)', textTransform: 'uppercase', marginBottom: 8, lineHeight: 1.2 }}>Выберите этаж</div>
                        <div style={{ fontSize: 12, color: 'var(--c-gray-500)', lineHeight: 1.5, marginBottom: 16 }}>
                          Наведите на этаж на фотографии
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                          <div style={{ padding: '10px 12px', background: '#faf9f7', borderRadius: 8, border: '1px solid #ece9e5' }}>
                            <div style={{ fontSize: 9, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--c-gray-400)', marginBottom: 2 }}>Этажей</div>
                            <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--c-charcoal)' }}>{korpus.floors}</div>
                          </div>
                          <div style={{ padding: '10px 12px', background: '#faf9f7', borderRadius: 8, border: '1px solid #ece9e5' }}>
                            <div style={{ fontSize: 9, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--c-gray-400)', marginBottom: 2 }}>Квартир</div>
                            <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--c-charcoal)' }}>{korpus.total}</div>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                )}

              </div>

              {/* Stylish step hint */}
              <div style={{ marginTop: 28, textAlign: 'center' }}>
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ width: 32, height: 1, background: 'linear-gradient(90deg, transparent, var(--c-brand))' }} />
                  <span style={{ fontFamily: 'var(--font-display)', fontSize: 13, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--c-brand)' }}>
                    {step === 0 ? '01 — Выберите корпус' : '02 — Выберите этаж'}
                  </span>
                  <span style={{ width: 32, height: 1, background: 'linear-gradient(90deg, var(--c-brand), transparent)' }} />
                </div>
                <div style={{ marginTop: 8, fontSize: 13, color: 'var(--c-gray-400)', letterSpacing: '0.02em', fontStyle: 'italic' }}>
                  {step === 0 ? 'кликните на любое здание — камера приблизит к нему' : 'наведите курсор на нужный этаж и нажмите для просмотра квартир'}
                </div>
              </div>
            </div>
          );
        })()}

        {/* ─── STEP 2 — Floor plan with apartments ─── */}
        {step === 2 && korpus && floor && (
          <div style={{ animation: 'fadeUp 350ms ease-out' }}>
            {/* Back button */}
            <div style={{ marginBottom: 16 }}>
              <button onClick={() => goBackTo(1)} style={{
                padding: '10px 18px 10px 14px', borderRadius: 99,
                background: '#fff', border: '1.5px solid #ece9e5',
                fontSize: 13, fontWeight: 600, color: 'var(--c-charcoal)',
                cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 8,
                fontFamily: 'var(--font-body)',
                transition: 'all 200ms cubic-bezier(0.4,0,0.2,1)',
                boxShadow: '0 2px 8px rgba(0,0,0,0.04)',
              }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'translateX(-2px)'; e.currentTarget.style.borderColor = 'var(--c-brand)'; e.currentTarget.style.color = 'var(--c-brand)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform = 'translateX(0)'; e.currentTarget.style.borderColor = '#ece9e5'; e.currentTarget.style.color = 'var(--c-charcoal)'; }}
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                К выбору этажа
              </button>
            </div>

            {/* Filters bar */}
            <div style={{ display: 'flex', gap: 10, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center' }}>
              <span style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--c-gray-500)', marginRight: 6 }}>Комнатность</span>
              {[null, 1, 2, 3].map(r => (
                <button key={r} onClick={() => setFilterRooms(r)} style={{
                  padding: '7px 16px', borderRadius: 99, border: '1.5px solid',
                  fontFamily: 'var(--font-body)', fontSize: 12, cursor: 'pointer', transition: 'all 160ms',
                  background: filterRooms === r ? 'var(--c-brand)' : '#fff',
                  borderColor: filterRooms === r ? 'var(--c-brand)' : '#ece9e5',
                  color: filterRooms === r ? '#fff' : 'var(--c-gray-500)',
                }}>{r === null ? 'Все' : `${r}к`}</button>
              ))}
              <span style={{ width: 1, height: 22, background: '#ece9e5', margin: '0 8px' }} />
              <span style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--c-gray-500)', marginRight: 6 }}>Статус</span>
              {[['all', 'Все'], ['free', 'Свободные'], ['booked', 'Бронь']].map(([v, l]) => (
                <button key={v} onClick={() => setFilterAvail(v)} style={{
                  padding: '7px 14px', borderRadius: 99, border: '1.5px solid',
                  fontFamily: 'var(--font-body)', fontSize: 12, cursor: 'pointer', transition: 'all 160ms',
                  background: filterAvail === v ? 'var(--c-charcoal)' : '#fff',
                  borderColor: filterAvail === v ? 'var(--c-charcoal)' : '#ece9e5',
                  color: filterAvail === v ? '#fff' : 'var(--c-gray-500)',
                }}>{l}</button>
              ))}
              <div style={{ marginLeft: 'auto', display: 'flex', gap: 16, fontSize: 13 }}>
                <span style={{ color: '#16a34a' }}>● Свободно: {stats.free}</span>
                <span style={{ color: 'var(--c-gray-400)' }}>● Бронь: {stats.booked}</span>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 24, alignItems: 'start' }}>
              {/* Floor map area */}
              <div style={{
                background: '#fff', borderRadius: 16, padding: 24,
                boxShadow: '0 4px 24px rgba(0,0,0,0.08)', border: '1px solid #ece9e5',
              }}>
                <div style={{
                  background: 'var(--c-surface)', borderRadius: 10, padding: '14px 20px', marginBottom: 16,
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                }}>
                  <span style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--c-charcoal)', textTransform: 'uppercase' }}>
                    {floor} ЭТАЖ · {korpus.name}
                  </span>
                  <span style={{ fontSize: 12, color: 'var(--c-gray-500)' }}>
                    Всего {stats.total} квартир
                  </span>
                </div>
                {hasSchema
                  ? <FloorSchema schemaUrl={korpus.floorSchemas[floor]} apartments={filtered} hoveredId={hoveredId} selectedApt={selectedApt} onSelect={setSelectedApt} onHover={setHoveredId} />
                  : <FloorMap  apartments={filtered} hoveredId={hoveredId} selectedApt={selectedApt} onSelect={setSelectedApt} onHover={setHoveredId} />
                }
                {/* Legend */}
                <div style={{ display: 'flex', gap: 20, marginTop: 14, fontSize: 12, color: 'var(--c-gray-500)' }}>
                  {[
                    { color: '#fff', border: '1.5px solid #C0B8B0', label: 'Свободна' },
                    { color: '#D94E1F', border: 'none', label: 'Выбрана' },
                    { color: '#EDE8E3', border: '1.5px solid #C0B8B0', label: 'Бронь' },
                  ].map(({ color, border, label }) => (
                    <span key={label} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      <span style={{ width: 12, height: 12, background: color, border, borderRadius: 3, display: 'inline-block' }} />
                      {label}
                    </span>
                  ))}
                </div>
              </div>

              {/* Apartment detail panel */}
              <div>
                {selectedApt ? (
                  <div style={{ background: '#fff', borderRadius: 16, overflow: 'hidden', boxShadow: '0 4px 24px rgba(0,0,0,0.08)', border: '1px solid #ece9e5', animation: 'fadeUp 250ms ease-out' }}>
                    <div style={{ background: 'linear-gradient(135deg, #E05520, #C43818)', padding: '20px 22px 16px' }}>
                      <div style={{ fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)', marginBottom: 6 }}>Выбранная квартира</div>
                      <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, color: '#fff', textTransform: 'uppercase' }}>Кв. {selectedApt.apt}</div>
                      <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, color: 'rgba(255,255,255,0.85)', textTransform: 'uppercase' }}>{selectedApt.rooms}-комнатная</div>
                    </div>
                    <div style={{ padding: 22 }}>
                      {[['Площадь', `${selectedApt.area} м²`], ['Этаж', `${selectedApt.floor} из ${korpus.floors}`], ['Корпус', selectedApt.korpus]].map(([l, v]) => (
                        <div key={l} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid var(--c-gray-100)' }}>
                          <span style={{ fontSize: 13, color: 'var(--c-gray-500)' }}>{l}</span>

/* ─── SCROLL REVEAL ─── */
function useReveal() {
  useEffect(() => {
    const observe = () => {
      const els = document.querySelectorAll('.reveal');
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      els.forEach(el => io.observe(el));
      return () => io.disconnect();
    };
    const cleanup = observe();
    return cleanup;
  }, []);
}

/* ─── APP ─── */
function App() {
  const [activeSection, setActiveSection] = useState('hero');
  const [selectedApt, setSelectedApt] = useState(null);
  const [view, setView] = useState(() => {
    const p = (typeof window !== 'undefined' ? window.location.pathname : '/').replace(/\/$/, '') || '/';
    return p === '/flat' ? 'apartments' : 'home';
  });
  useReveal();

  const handleNav = useCallback((sectionId) => {
    // On /flat — navigate to home with hash (full reload)
    if (view === 'apartments') {
      window.location.href = '/#' + sectionId;
      return;
    }
    setActiveSection(sectionId);
    const el = document.getElementById(sectionId);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  }, [view]);

  const goHome = () => { window.location.href = '/'; };

  // On home, scroll to hash if present (after navigation from /flat)
  useEffect(() => {
    if (view !== 'home') return;
    const hash = window.location.hash.replace('#', '');
    if (hash) {
      setTimeout(() => {
        const el = document.getElementById(hash);
        if (el) {
          const top = el.getBoundingClientRect().top + window.scrollY - 72;
          window.scrollTo({ top, behavior: 'smooth' });
          setActiveSection(hash);
        }
      }, 200);
    }
  }, []);

  useEffect(() => {
    if (view !== 'home') return;
    const sections = ['hero', 'about', 'about-complex', 'catalog', 'floorplan', 'promos', 'features', 'progress', 'construction', 'infrastructure', 'contact'];
    const observer = new IntersectionObserver(
      entries => { entries.forEach(entry => { if (entry.isIntersecting) setActiveSection(entry.target.id); }); },
      { rootMargin: '-40% 0px -40% 0px' }
    );
    sections.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, [view]);

  if (view === 'apartments') {
    return (
      <div>

        <div style={{ paddingTop: 110, paddingBottom: 16, background: 'var(--c-surface)' }}>

            }}
              onMouseEnter={e => {

                e.currentTarget.style.color = 'var(--c-brand)';

                e.currentTarget.style.borderColor = '#e8e5e1';
                e.currentTarget.style.color = 'var(--c-charcoal)';
                e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8)';
              }}
            >
              <span style={{
                width: 28, height: 28, borderRadius: '50%',
                background: 'linear-gradient(135deg, #E05520, #C43818)', color: '#fff',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 2px 8px rgba(217,78,31,0.4)',
                flexShrink: 0,
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </span>
              На главную
            </button>
          </div>
        </div>
        <ApartmentCatalog onSelectApt={setSelectedApt} fullPage onBackHome={goHome} />
        <Footer />
        {selectedApt && <ApartmentModal apt={selectedApt} onClose={() => setSelectedApt(null)} />}
      </div>
    );
  }

  return (
    <div>
      <Header activeSection={activeSection} onNav={handleNav} />
      <Hero onNav={handleNav} />
      <div className="reveal"><AboutStrip /></div>
      <div className="reveal"><AboutComplex /></div>
      <div className="reveal"><ApartmentCatalog onSelectApt={setSelectedApt} /></div>
      <div className="reveal"><FloorPlan onSelectApt={setSelectedApt} /></div>
      <div className="reveal"><Promos /></div>
      <div className="reveal"><Features /></div>
      <div className="reveal"><Gallery /></div>
      <div className="reveal"><ConstructionProgress /></div>
      <div className="reveal"><Infrastructure /></div>
      <div className="reveal"><ContactForm /></div>
      <Footer />
      {selectedApt && <ApartmentModal apt={selectedApt} onClose={() => setSelectedApt(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
})();
</script>
</body>
</html>
